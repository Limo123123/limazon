<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us - Limo P2P Edition</title>
    <style>
        :root {
            --bg-color: #000;
            --accent: #ff0000;
            --text-main: #fff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            user-select: none;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }

        #uiLayer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .screen {
            background: rgba(20, 20, 20, 0.95);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #444;
            text-align: center;
            pointer-events: auto;
            min-width: 320px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        h1 {
            color: var(--accent);
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #ccc;
            margin-bottom: 20px;
        }

        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #388E3C;
        }

        .btn-blue {
            background: #2196F3;
        }

        .btn-blue:hover {
            background: #1976D2;
        }

        .btn-danger {
            background: #d32f2f;
        }

        .btn-danger:hover {
            background: #b71c1c;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #gameCanvas {
            display: block;
            background: #000;
        }

        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            pointer-events: none;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            z-index: 50;
        }

        #ventHint {
            font-size: 14px;
            color: #aaa;
            margin-top: 5px;
            display: none;
        }

        #p2pError {
            color: #ff4444;
            font-size: 14px;
            margin-top: 5px;
            display: none;
            background: rgba(255, 0, 0, 0.2);
            padding: 5px;
            border-radius: 4px;
        }

        .action-btn {
            position: absolute;
            bottom: 30px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            pointer-events: auto;
            display: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            z-index: 50;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        #taskBtn {
            right: 20px;
            background: #fbc02d;
            color: black;
            border: 4px solid #f9a825;
        }

        #reportBtn {
            right: 100px;
            background: #d32f2f;
            color: white;
            border: 4px solid #b71c1c;
        }

        #ventBtn {
            right: 180px;
            background: #757575;
            color: white;
            border: 4px solid #424242;
        }

        /* Meeting & Chat */
        #meetingScreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 3000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .meeting-box {
            background: #2a2a35;
            border: 2px solid #444;
            border-radius: 10px;
            padding: 20px;
            width: 90%;
            max-width: 700px;
            text-align: center;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            max-height: 80vh;
        }

        .meeting-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
            overflow: hidden;
            margin-top: 15px;
        }

        @media(min-width: 600px) {
            .meeting-content {
                flex-direction: row;
            }
        }

        .voting-area {
            flex: 1;
            overflow-y: auto;
            background: #1e1e24;
            border-radius: 8px;
            padding: 10px;
            min-width: 0;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1e1e24;
            border-radius: 8px;
            padding: 10px;
            min-width: 0;
        }

        #chatMessages {
            flex: 1;
            overflow-y: auto;
            text-align: left;
            font-size: 13px;
            margin-bottom: 10px;
            min-height: 100px;
            word-break: break-word;
            padding-right: 5px;
        }

        .chat-input-row {
            display: flex;
            gap: 5px;
        }

        .chat-input-row input {
            flex: 1;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            min-width: 0;
        }

        .player-vote-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            margin: 5px 0;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #444;
        }

        .player-vote-row.dead {
            opacity: 0.5;
            text-decoration: line-through;
        }

        .vote-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .vote-btn:hover {
            background: #388E3C;
        }

        #introScreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 4000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s;
        }

        .intro-role {
            font-size: 60px;
            font-weight: bold;
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        .intro-crew {
            color: #2196F3;
            text-shadow: 0 0 20px rgba(33, 150, 243, 0.5);
        }

        .intro-imp {
            color: #f44336;
            text-shadow: 0 0 20px rgba(244, 67, 54, 0.5);
        }

        #ejectScreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 5000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @keyframes floatSpace {
            0% {
                transform: translateX(-100vw) rotate(0deg);
            }

            100% {
                transform: translateX(100vw) rotate(360deg);
            }
        }

        .eject-text {
            font-size: 24px;
            color: #fff;
            margin-top: 20px;
            font-family: monospace;
        }

        .ejected-body {
            font-size: 50px;
            animation: floatSpace 4s linear forwards;
        }
    </style>
</head>

<body>

    <div id="hud" style="display: none;">
        <div id="taskContainer">Tasks: <span id="taskCount" style="color:#fbc02d">0</span> / 0</div>
        <div id="p2pStatus" style="font-size: 12px; color: #888; margin-top: 5px;">Modus: Solo</div>
        <div id="p2pError">⚠️ P2P Verbindung fehlgeschlagen! (NAT/Firewall blockiert)</div>
        <div id="ventHint">⬅️ Bewegen / Wischen ➡️</div>
    </div>

    <button id="taskBtn" class="action-btn" onclick="game.doTask()">USE</button>
    <button id="reportBtn" class="action-btn" onclick="game.reportBody()">REPORT</button>
    <button id="ventBtn" class="action-btn" onclick="game.useVent()">VENT</button>

    <canvas id="gameCanvas"></canvas>

    <div id="uiLayer">
        <div id="startScreen" class="screen">
            <h1>Among Us<br><small style="font-size:14px; color:#888;">Limo P2P Edition</small></h1>
            <p id="userInfo">Lade Spielerdaten...</p>

            <div
                style="background: #111; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: left; font-size: 14px;">
                <label style="display:flex; justify-content:space-between; margin-bottom:5px;">Impostors:
                    <select id="settingImpostors"
                        style="background:#333; color:#fff; border:1px solid #555; padding:3px; border-radius:4px;">
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                </label>
                <label style="display:flex; justify-content:space-between; margin-bottom:5px;">Kill Cooldown:
                    <select id="settingCooldown"
                        style="background:#333; color:#fff; border:1px solid #555; padding:3px; border-radius:4px;">
                        <option value="10">10s</option>
                        <option value="15" selected>15s</option>
                        <option value="25">25s</option>
                    </select>
                </label>
                <label style="display:flex; justify-content:space-between;">Team Tasks (Gesamt):
                    <select id="settingTasks"
                        style="background:#333; color:#fff; border:1px solid #555; padding:3px; border-radius:4px;">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="15">15</option>
                    </select>
                </label>
            </div>

            <div style="display:flex; gap:10px; margin-bottom: 10px;">
                <button class="btn btn-blue" id="hostBtn" onclick="game.hostLobby()" disabled>Lobby Hosten</button>
                <button class="btn btn-blue" id="joinBtn" onclick="game.joinLobby()" disabled>Beitreten</button>
            </div>
            <button class="btn" id="startBtn" onclick="game.startSolo()" disabled>Solo spielen</button>

            <button class="btn" style="background:#8b5cf6;" onclick="window.location.href='/games/map_creator.html'">🛠️
                Map Creator & Outfit</button>
            <button class="btn btn-danger" onclick="window.location.href='/'">Zurück zur Arcade</button>
        </div>

        <div id="matchmakingScreen" class="screen" style="display: none;">
            <h2 style="margin:0 0 15px 0;">Warte auf Spieler...</h2>
            <div id="roomCodeDisplay"
                style="font-size:24px; color:var(--accent); font-weight:bold; margin-bottom:10px;"></div>
            <div id="playerList"
                style="text-align:left; font-family:monospace; margin-bottom:15px; color:#aaa; min-height:100px; background:#111; padding:10px; border-radius:6px;">
            </div>
            <button class="btn" id="forceStartBtn" onclick="game.startGame()" style="display:none;">Spiel
                Starten</button>
        </div>

        <div id="gameOverScreen" class="screen" style="display: none;">
            <h1 id="endTitle">DEFEAT</h1>
            <p id="endReason">...</p>
            <button class="btn" onclick="window.location.reload()">Zurück ins Menü</button>
        </div>
    </div>

    <div id="ejectScreen">
        <div id="ejectCharacter" class="ejected-body">💀</div>
        <div id="ejectText" class="eject-text">... wurde rausgeworfen ...</div>
    </div>

    <div id="introScreen">
        <div id="introRole" class="intro-role">CREWMATE</div>
        <p id="introSub" style="font-size:20px; color:#aaa;">There is 1 Impostor among us</p>
    </div>

    <div id="meetingScreen">
        <div class="meeting-box">
            <h1 id="meetingTitle" style="color: #ff0000; margin-bottom: 5px;">EMERGENCY MEETING</h1>
            <p id="meetingReporter" style="margin-top: 0; color: #aaa;">...</p>
            <div style="font-weight:bold; color:#fbc02d" id="meetingTimer">Zeit: --s</div>

            <div class="meeting-content">
                <div class="voting-area" id="votingList"></div>
                <div class="chat-area">
                    <div id="chatMessages"></div>
                    <div class="chat-input-row">
                        <input type="text" id="chatInput" placeholder="Wer ist sus?"
                            onkeypress="if(event.key==='Enter') game.sendChat()">
                        <button class="btn btn-blue" style="margin:0; width:auto; padding:8px 15px;"
                            onclick="game.sendChat()">Send</button>
                    </div>
                </div>
            </div>
            <button class="btn btn-blue" id="skipVoteBtn" style="margin-top:15px;" onclick="game.castVote('skip')"
                disabled>Skip Vote</button>
        </div>
    </div>

    <script>
        const API = 'https://api.limazon.v6.rocks/api';
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const savedSettings = JSON.parse(localStorage.getItem('au_settings'));
        const myColor = savedSettings ? savedSettings.color : '#c51111';

        const game = {
            user: null, running: false, state: 'IDLE',
            tasksCompleted: 0, totalTasks: 5, frame: 0,

            // WebRTC
            roomCode: null, isHost: false, hostId: null,
            peers: {}, pollInterval: null, lastSync: 0, iceCandidateQueue: [],
            settings: { impostors: 1, killCooldown: 15 * 60, totalTasks: 10 },

            joystick: { active: false, id: null, originX: 0, originY: 0, currentX: 0, currentY: 0, dx: 0, dy: 0 },

            player: { id: 'me', x: 0, y: 0, size: 14, speed: 5, color: myColor, dx: 0, dy: 0, isImpostor: false, isAlive: true, killCooldown: 0, inVent: false, currentVentIndex: 0 },
            bots: [], deadBodies: [], tasks: [],
            meeting: { phase: 'none', timer: 0, votes: {}, hasVoted: false, reporter: '' },
            ventSwitchCooldown: 0,

            map: {
                w: 2000, h: 1500,
                walls: [
                    { x: 0, y: 0, w: 2000, h: 20 }, { x: 0, y: 1480, w: 2000, h: 20 }, { x: 0, y: 0, w: 20, h: 1500 }, { x: 1980, y: 0, w: 20, h: 1500 }
                ],
                vents: [{ x: 200, y: 200 }, { x: 1800, y: 200 }],
                floors: [], decor: []
            },
            camera: { x: 0, y: 0 }, keys: {},

            init: async () => {
                game.resize();
                window.addEventListener('resize', game.resize);
                window.addEventListener('keydown', (e) => game.keys[e.code] = true);
                window.addEventListener('keyup', (e) => game.keys[e.code] = false);

                canvas.addEventListener('touchstart', game.handleTouchStart, { passive: false });
                canvas.addEventListener('touchmove', game.handleTouchMove, { passive: false });
                canvas.addEventListener('touchend', game.handleTouchEnd, { passive: false });
                canvas.addEventListener('touchcancel', game.handleTouchEnd, { passive: false });

                await game.checkAuth();
            },

            resize: () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; },

            handleTouchStart: (e) => {
                if (game.state !== 'PLAYING') return;
                for (let i = 0; i < e.changedTouches.length; i++) {
                    let t = e.changedTouches[i];
                    if (t.clientX < window.innerWidth / 2 && !game.joystick.active) {
                        game.joystick.active = true; game.joystick.id = t.identifier;
                        game.joystick.originX = t.clientX; game.joystick.originY = t.clientY;
                        game.joystick.currentX = t.clientX; game.joystick.currentY = t.clientY;
                        game.joystick.dx = 0; game.joystick.dy = 0;
                    }
                }
            },
            handleTouchMove: (e) => {
                if (!game.joystick.active) return;
                for (let i = 0; i < e.changedTouches.length; i++) {
                    let t = e.changedTouches[i];
                    if (t.identifier === game.joystick.id) {
                        let dx = t.clientX - game.joystick.originX, dy = t.clientY - game.joystick.originY;
                        let dist = Math.hypot(dx, dy), maxDist = 50;
                        if (dist > maxDist) { dx = (dx / dist) * maxDist; dy = (dy / dist) * maxDist; }
                        game.joystick.dx = dx / maxDist; game.joystick.dy = dy / maxDist;
                    }
                }
            },
            handleTouchEnd: (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    let t = e.changedTouches[i];
                    if (game.joystick.active && t.identifier === game.joystick.id) {
                        game.joystick.active = false; game.joystick.dx = 0; game.joystick.dy = 0;
                    }
                }
            },

            checkAuth: async () => {
                try {
                    const res = await fetch(`${API}/auth/me`, { credentials: 'include' });
                    if (res.ok) {
                        game.user = await res.json();
                        game.player.id = game.user.userId;
                        document.getElementById('userInfo').innerText = `Eingeloggt als: ${game.user.username}`;
                        document.getElementById('startBtn').disabled = false;
                        document.getElementById('hostBtn').disabled = false;
                        document.getElementById('joinBtn').disabled = false;
                    }
                } catch (e) { document.getElementById('startBtn').disabled = false; }
            },

            lineIntersect: (x1, y1, x2, y2, x3, y3, x4, y4) => {
                let dir = ((y4 - y3) * (x2 - x1) - (x4 - x3) * (y2 - y1));
                if (dir === 0) return false;
                let uA = ((x4 - x3) * (y1 - y3) - (y4 - y3) * (x1 - x3)) / dir;
                let uB = ((x2 - x1) * (y1 - y3) - (y2 - y1) * (x1 - x3)) / dir;
                return (uA >= 0 && uA <= 1 && uB >= 0 && uB <= 1);
            },
            hasLineOfSight: (x1, y1, x2, y2) => {
                for (let w of game.map.walls) {
                    if (game.lineIntersect(x1, y1, x2, y2, w.x, w.y, w.x + w.w, w.y)) return false;
                    if (game.lineIntersect(x1, y1, x2, y2, w.x, w.y + w.h, w.x + w.w, w.y + w.h)) return false;
                    if (game.lineIntersect(x1, y1, x2, y2, w.x, w.y, w.x, w.y + w.h)) return false;
                    if (game.lineIntersect(x1, y1, x2, y2, w.x + w.w, w.y, w.x + w.w, w.y + w.h)) return false;
                }
                return true;
            },
            checkCollision: (x, y, size) => {
                const px = x - size, py = y - size, pw = size * 2, ph = size * 2;
                for (let w of game.map.walls) { if (px < w.x + w.w && px + pw > w.x && py < w.y + w.h && py + ph > w.y) return true; }
                return false;
            },
            getRandomSafePos: () => {
                let x, y, safe = false, attempts = 0;
                while (!safe && attempts < 200) {
                    x = 100 + Math.random() * (game.map.w - 200); y = 100 + Math.random() * (game.map.h - 200);
                    safe = !game.checkCollision(x, y, 20);
                    attempts++;
                }
                return { x, y };
            },

            // ==========================================
            // WEBRTC SIGNALING (STAR TOPOLOGY)
            // ==========================================
            sendToHost: (dataObj) => {
                if (game.isHost) return;
                const dc = game.peers[game.hostId] ? game.peers[game.hostId].dataChannel : null;
                if (dc && dc.readyState === 'open') {
                    dc.send(JSON.stringify(dataObj));
                }
            },

            createPeerConnection: (targetId) => {
                const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
                game.peers[targetId] = {
                    pc: pc, dataChannel: null, iceQueue: [],
                    x: -1000, y: -1000, dx: 0, dy: 0, isAlive: false, isImpostor: false, inVent: false, color: '#' + Math.floor(Math.random() * 16777215).toString(16), name: '...'
                };

                pc.onicecandidate = async (e) => {
                    if (e.candidate) {
                        await fetch(`${API}/amongus/signal`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ roomCode: game.roomCode, targetId: targetId, signal: { ice: e.candidate } }), credentials: 'include'
                        });
                    }
                };

                pc.oniceconnectionstatechange = () => {
                    if (pc.iceConnectionState === 'failed' || pc.iceConnectionState === 'disconnected') {
                        document.getElementById('p2pError').style.display = 'block';
                    } else if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
                        document.getElementById('p2pError').style.display = 'none';
                        document.getElementById('p2pStatus').innerText = "P2P: Verbunden";
                        document.getElementById('p2pStatus').style.color = "#4CAF50";
                    }
                };

                pc.ondatachannel = (e) => {
                    game.peers[targetId].dataChannel = e.channel;
                    game.setupDataChannel(targetId);
                };

                return pc;
            },

            hostLobby: async () => {
                game.settings.impostors = parseInt(document.getElementById('settingImpostors').value);
                game.settings.killCooldown = parseInt(document.getElementById('settingCooldown').value) * 60;
                game.settings.totalTasks = parseInt(document.getElementById('settingTasks').value);

                const res = await fetch(`${API}/amongus/host`, { method: 'POST', credentials: 'include' });
                const data = await res.json();
                if (data.error) return alert(data.error);

                game.roomCode = data.roomCode; game.isHost = true; game.hostId = game.player.id;
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('matchmakingScreen').style.display = 'block';
                document.getElementById('roomCodeDisplay').innerText = game.roomCode;
                document.getElementById('forceStartBtn').style.display = 'block';
                document.getElementById('p2pStatus').innerText = "P2P: Warte auf Spieler (Host)";
                game.startPolling();
            },

            joinLobby: async () => {
                const code = prompt("Bitte 4-stelligen Raumcode eingeben:");
                if (!code) return;
                const res = await fetch(`${API}/amongus/join`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ roomCode: code }), credentials: 'include'
                });
                const data = await res.json();
                if (data.error) return alert(data.error);

                game.roomCode = data.roomCode; game.isHost = false; game.hostId = data.hostId;
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('matchmakingScreen').style.display = 'block';
                document.getElementById('roomCodeDisplay').innerText = game.roomCode;
                document.getElementById('p2pStatus').innerText = "P2P: Verbinde mit Host...";

                const pc = game.createPeerConnection(game.hostId);
                game.startPolling();
            },

            startPolling: () => {
                game.pollInterval = setInterval(async () => {
                    try {
                        const res = await fetch(`${API}/amongus/signal/${game.roomCode}`, { credentials: 'include' });
                        const data = await res.json();

                        let html = `> <b>Host:</b> ${game.isHost ? 'Du' : 'Online'}<br>`;
                        if (data.guests) {
                            data.guests.forEach(g => {
                                html += `> Gast: ${g.name}<br>`;
                                if (game.isHost && !game.peers[g.id]) {
                                    const pc = game.createPeerConnection(g.id);
                                    const dc = pc.createDataChannel("gameData");
                                    game.peers[g.id].dataChannel = dc;
                                    game.setupDataChannel(g.id);
                                    game.peers[g.id].name = g.name;

                                    pc.createOffer().then(async offer => {
                                        await pc.setLocalDescription(offer);
                                        await fetch(`${API}/amongus/signal`, {
                                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                                            body: JSON.stringify({ roomCode: game.roomCode, targetId: g.id, signal: { sdp: pc.localDescription } }), credentials: 'include'
                                        });
                                    });
                                }
                            });
                        }
                        document.getElementById('playerList').innerHTML = html;

                        if (!data.signals) return;
                        for (let s of data.signals) {
                            const senderId = s.from;
                            if (!game.peers[senderId] && !game.isHost) { } // Guest kennt Host schon
                            const pc = game.peers[senderId].pc;

                            if (s.signal.sdp) {
                                await pc.setRemoteDescription(new RTCSessionDescription(s.signal.sdp));
                                if (s.signal.sdp.type === 'offer') {
                                    const answer = await pc.createAnswer();
                                    await pc.setLocalDescription(answer);
                                    await fetch(`${API}/amongus/signal`, {
                                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ roomCode: game.roomCode, targetId: senderId, signal: { sdp: pc.localDescription } }), credentials: 'include'
                                    });
                                }
                                while (game.peers[senderId].iceQueue.length > 0) {
                                    await pc.addIceCandidate(game.peers[senderId].iceQueue.shift());
                                }
                            } else if (s.signal.ice) {
                                const candidate = new RTCIceCandidate(s.signal.ice);
                                if (pc.remoteDescription) await pc.addIceCandidate(candidate);
                                else game.peers[senderId].iceQueue.push(candidate);
                            }
                        }
                    } catch (err) { }
                }, 2000);
            },

            setupDataChannel: (targetId) => {
                const dc = game.peers[targetId].dataChannel;

                dc.onmessage = (event) => {
                    const data = JSON.parse(event.data);

                    if (game.isHost) {
                        // --- HOST EMPFÄNGT DATEN VOM GAST ---
                        if (data.type === 'guest_update') {
                            let p = game.peers[targetId];
                            if (p && data.player) {
                                p.x = data.player.x; p.y = data.player.y; p.dx = data.player.dx;
                                p.isAlive = data.player.isAlive; p.inVent = data.player.inVent;
                                if (data.player.color) p.color = data.player.color;
                                if (data.player.name) p.name = data.player.name;
                            }
                        }
                        if (data.type === 'task_done') {
                            game.tasksCompleted++;
                            if (game.tasks[data.taskId]) game.tasks[data.taskId].active = false;
                            document.getElementById('taskCount').innerText = game.tasksCompleted;
                            game.checkWinCondition();
                        }
                        if (data.type === 'call_meeting') game.startMeeting(data.reporter);
                        if (data.type === 'kill_request') {
                            if (data.target === 'host') {
                                game.player.isAlive = false; game.deadBodies.push({ x: game.player.x, y: game.player.y, color: game.player.color });
                            } else if (data.target === 'peer') {
                                let p = game.peers[data.peerId];
                                if (p && p.isAlive) { p.isAlive = false; game.deadBodies.push({ x: p.x, y: p.y, color: p.color }); }
                            } else if (data.target === 'bot') {
                                let b = game.bots[data.botId];
                                if (b && b.isAlive) { b.isAlive = false; game.deadBodies.push({ x: b.x, y: b.y, color: b.color }); }
                            }
                            game.checkWinCondition();
                        }
                        if (data.type === 'chat_msg') game.receiveChat(data.sender, data.msg);
                        if (data.type === 'vote_cast') game.registerVote(data.voteTarget);

                    } else {
                        // --- GAST EMPFÄNGT DATEN VOM HOST ---
                        if (data.type === 'host_update') {
                            // Den Host aktualisieren
                            if (!game.peers[game.hostId]) game.peers[game.hostId] = { color: '#888', name: 'Host' };
                            let hostP = game.peers[game.hostId];
                            if (data.hostPlayer) {
                                hostP.x = data.hostPlayer.x; hostP.y = data.hostPlayer.y; hostP.dx = data.hostPlayer.dx;
                                hostP.isAlive = data.hostPlayer.isAlive; hostP.inVent = data.hostPlayer.inVent;
                            }

                            // Die anderen Mitspieler aktualisieren
                            for (const [id, state] of Object.entries(data.peers)) {
                                if (id !== game.player.id) {
                                    if (!game.peers[id]) game.peers[id] = { color: '#888', name: 'Player' };
                                    game.peers[id].x = state.x; game.peers[id].y = state.y; game.peers[id].dx = state.dx;
                                    game.peers[id].isAlive = state.isAlive; game.peers[id].inVent = state.inVent;
                                    if (state.name) game.peers[id].name = state.name;
                                    if (state.color) game.peers[id].color = state.color;
                                }
                            }
                            game.bots = data.bots; game.tasks = data.tasks; game.tasksCompleted = data.tasksCompleted; game.deadBodies = data.deadBodies;
                            if (!game.player.isImpostor) document.getElementById('taskCount').innerText = game.tasksCompleted;
                        }
                        if (data.type === 'game_setup') {
                            game.player.isImpostor = data.myRole === 'impostor';
                            Object.keys(data.peerRoles).forEach(id => { if (game.peers[id]) game.peers[id].isImpostor = data.peerRoles[id]; });
                            game.settings.killCooldown = data.settings.killCooldown; game.totalTasks = data.settings.totalTasks;
                            if (data.map) {
                                game.map.walls = data.map.walls; game.map.vents = data.map.vents;
                                game.map.w = data.map.w; game.map.h = data.map.h;
                                game.map.floors = data.map.floors || []; game.map.decor = data.map.decor || [];
                            }
                            game.playIntro();
                        }
                        if (data.type === 'call_meeting') game.startMeeting(data.reporter);
                        if (data.type === 'meeting_sync') game.renderMeetingUI(data.meeting);
                        if (data.type === 'meeting_result') game.showEjection(data.msg, data.nobodyEjected);
                        if (data.type === 'chat_msg') game.receiveChat(data.sender, data.msg);
                        if (data.type === 'game_over') game.endGame(data.title, data.reason);
                    }
                };
            },

            broadcast: (dataObj) => {
                const msg = JSON.stringify(dataObj);
                Object.values(game.peers).forEach(p => {
                    if (p.dataChannel && p.dataChannel.readyState === 'open') p.dataChannel.send(msg);
                });
            },

            // ==========================================
            // GAME LOGIC
            // ==========================================
            startSolo: () => {
                game.settings.impostors = parseInt(document.getElementById('settingImpostors').value);
                game.settings.killCooldown = parseInt(document.getElementById('settingCooldown').value) * 60;
                game.settings.totalTasks = parseInt(document.getElementById('settingTasks').value);
                document.getElementById('startScreen').style.display = 'none';
                game.isHost = true;
                game.startGame();
            },

            playIntro: () => {
                document.getElementById('matchmakingScreen').style.display = 'none';
                const intro = document.getElementById('introScreen');
                const roleText = document.getElementById('introRole');

                intro.style.display = 'flex'; intro.style.opacity = '1';

                if (game.player.isImpostor) {
                    roleText.innerText = "IMPOSTOR"; roleText.className = "intro-role intro-imp";
                    document.getElementById('introSub').innerText = "Eliminiere die Crewmates.";
                } else {
                    roleText.innerText = "CREWMATE"; roleText.className = "intro-role intro-crew";
                    document.getElementById('introSub').innerText = "Erledige alle Tasks.";
                }

                setTimeout(() => {
                    intro.style.opacity = '0';
                    setTimeout(() => { intro.style.display = 'none'; game.launchGameplay(); }, 1000);
                }, 3000);
            },

            startGame: async () => {
                clearInterval(game.pollInterval);
                if (game.isHost) {

                    // --- CUSTOM MAP LOAD ---
                    try {
                        const res = await fetch(`${API}/realestate/my-home`, { credentials: 'include' });
                        const data = await res.json();
                        if (data.hasHome && data.amongUsMap && data.amongUsMap.length > 0) {
                            game.map.walls = [];
                            game.map.vents = [];
                            game.map.floors = [];
                            game.map.decor = [];
                            let possibleTasks = [];

                            data.amongUsMap.forEach(item => {
                                let w = item.w, h = item.h;
                                let x = item.x, y = item.y;

                                if (item.r === 90 || item.r === 270) {
                                    w = item.h; h = item.w;
                                    let cx = item.x + item.w / 2; let cy = item.y + item.h / 2;
                                    x = cx - w / 2; y = cy - h / 2;
                                }

                                if (item.layer === 'vent') game.map.vents.push({ x: x + w / 2, y: y + h / 2 });
                                else if (item.layer === 'task') possibleTasks.push({ x: x + w / 2, y: y + h / 2 });
                                else if (item.layer === 'floor') game.map.floors.push({ x: x, y: y, w: w, h: h, bg: item.bg, icon: item.icon });
                                else if (item.layer === 'decor') game.map.decor.push({ x: x, y: y, w: w, h: h, bg: item.bg, icon: item.icon });
                                else game.map.walls.push({ x: x, y: y, w: w, h: h, bg: item.bg, icon: item.icon });
                            });

                            if (possibleTasks.length > 0) game.map.customTasks = possibleTasks;

                            game.map.w = Math.max(2000, ...game.map.walls.map(w => w.x + w.w));
                            game.map.h = Math.max(1500, ...game.map.walls.map(w => w.y + w.h));

                            // Map Begrenzung (Fallschutz)
                            game.map.walls.push({ x: -20, y: -20, w: game.map.w + 40, h: 20 });
                            game.map.walls.push({ x: -20, y: game.map.h, w: game.map.w + 40, h: 20 });
                            game.map.walls.push({ x: -20, y: 0, w: 20, h: game.map.h });
                            game.map.walls.push({ x: game.map.w, y: 0, w: 20, h: game.map.h });
                        }
                    } catch (e) { console.error("Konnte Custom Map nicht laden."); }

                    // --- ROLLEN & BOTS ---
                    const colors = ['#1e88e5', '#8e24aa', '#e53935', '#fdd835', '#8d6e63', '#00acc1', '#fb8c00', '#43a047'];
                    const playerIds = [game.player.id, ...Object.keys(game.peers)];
                    let botCount = Math.max(0, 8 - playerIds.length);

                    game.bots = [];
                    for (let i = 0; i < botCount; i++) {
                        game.bots.push({
                            id: i, x: 0, y: 0, size: 14, isAlive: true,
                            speed: 2 + Math.random(), color: colors[i % colors.length],
                            tx: 0, ty: 0, isImpostor: false, killCooldown: game.settings.killCooldown, stuckTimer: 0,
                            task: 'wander'
                        });
                    }

                    let rolePool = [{ type: 'player', id: game.player.id }];
                    Object.keys(game.peers).forEach(p => rolePool.push({ type: 'peer', id: p }));
                    game.bots.forEach((b, i) => rolePool.push({ type: 'bot', id: i }));

                    rolePool = rolePool.sort(() => 0.5 - Math.random());
                    const impCount = Math.min(game.settings.impostors, rolePool.length);
                    const impostors = rolePool.slice(0, impCount);
                    const impostorIds = impostors.map(imp => imp.id);

                    game.player.isImpostor = impostors.some(i => i.type === 'player');
                    const peerRoles = {};
                    Object.keys(game.peers).forEach(pId => {
                        game.peers[pId].isImpostor = impostors.some(i => i.type === 'peer' && i.id === pId);
                        peerRoles[pId] = game.peers[pId].isImpostor;
                    });
                    // Der Host muss auch in peerRoles, damit Gäste wissen, ob er Impostor ist
                    peerRoles[game.player.id] = game.player.isImpostor;

                    game.bots.forEach((b, i) => {
                        b.isImpostor = impostors.some(imp => imp.type === 'bot' && imp.id === i);
                    });

                    // --- TASKS VERTEILEN ---
                    const humanCrewIds = playerIds.filter(id => !impostorIds.includes(id));
                    game.totalTasks = humanCrewIds.length > 0 ? game.settings.totalTasks : 0;
                    game.tasks = [];

                    for (let i = 0; i < game.totalTasks; i++) {
                        let t;
                        if (game.map.customTasks && game.map.customTasks.length > 0) {
                            t = game.map.customTasks[Math.floor(Math.random() * game.map.customTasks.length)];
                        } else {
                            t = game.getRandomSafePos();
                        }
                        const ownerId = humanCrewIds.length > 0 ? humanCrewIds[i % humanCrewIds.length] : game.player.id;
                        game.tasks.push({ id: i, x: t.x, y: t.y, active: true, owner: ownerId });
                    }

                    // Sende Setup an alle Gäste
                    Object.keys(game.peers).forEach(id => {
                        if (game.peers[id].dataChannel && game.peers[id].dataChannel.readyState === 'open') {
                            game.peers[id].dataChannel.send(JSON.stringify({
                                type: 'game_setup', myRole: game.peers[id].isImpostor ? 'impostor' : 'crewmate',
                                peerRoles: peerRoles, settings: { killCooldown: game.settings.killCooldown, totalTasks: game.settings.totalTasks },
                                map: game.map
                            }));
                        }
                    });

                    game.playIntro();
                }
            },

            launchGameplay: () => {
                document.getElementById('hud').style.display = 'block';
                game.state = 'PLAYING';
                game.tasksCompleted = 0; game.deadBodies = [];

                game.resetPositions();
                game.player.killCooldown = game.settings.killCooldown;

                if (game.player.isImpostor) {
                    document.getElementById('taskContainer').innerHTML = '<span style="color:var(--accent)">Du bist der Impostor!</span>';
                    document.getElementById('taskBtn').innerText = Math.ceil(game.settings.killCooldown / 60);
                } else {
                    document.getElementById('taskContainer').innerHTML = `Tasks: <span id="taskCount" style="color:#fbc02d">0</span> / ${game.totalTasks}`;
                    document.getElementById('taskBtn').innerText = "USE";
                }

                game.running = true;
                requestAnimationFrame(game.loop);
            },

            resetPositions: () => {
                const centerSpawn = () => {
                    let p = { x: 1000 + (Math.random() * 200 - 100), y: 750 + (Math.random() * 200 - 100) };
                    let attempts = 0;
                    while (game.checkCollision(p.x, p.y, 20) && attempts < 100) {
                        p.x = 1000 + (Math.random() * 400 - 200); p.y = 750 + (Math.random() * 400 - 200);
                        attempts++;
                    }
                    if (attempts >= 100) p = game.getRandomSafePos();
                    return p;
                };

                if (game.player.isAlive) { let s = centerSpawn(); game.player.x = s.x; game.player.y = s.y; game.player.inVent = false; game.player.currentVentIndex = 0; }
                Object.values(game.peers).forEach(p => { if (p.isAlive) { let s = centerSpawn(); p.x = s.x; p.y = s.y; p.inVent = false; } });
                game.bots.forEach(b => { if (b.isAlive) { let s = centerSpawn(); b.x = s.x; b.y = s.y; b.tx = s.x; b.ty = s.y; b.task = 'wander'; b.waitTimer = 0; } });

                game.deadBodies = [];
                document.getElementById('ventHint').style.display = 'none';
            },

            // --- INTERAKTIONEN ---
            doTask: () => {
                if (game.state !== 'PLAYING') return;

                if (game.player.isImpostor) {
                    if (!game.player.isAlive || game.player.killCooldown > 0 || game.player.inVent) return;

                    for (let id of Object.keys(game.peers)) {
                        let p = game.peers[id];
                        if (p.isAlive && !p.isImpostor && Math.hypot(game.player.x - p.x, game.player.y - p.y) < 70 && game.hasLineOfSight(game.player.x, game.player.y, p.x, p.y)) {
                            game.player.killCooldown = game.settings.killCooldown;
                            if (game.isHost) {
                                p.isAlive = false; game.deadBodies.push({ x: p.x, y: p.y, color: p.color }); game.checkWinCondition();
                            } else {
                                if (id === game.hostId) { game.sendToHost({ type: 'kill_request', target: 'host' }); }
                                else { game.sendToHost({ type: 'kill_request', target: 'peer', peerId: id }); }
                            }
                            return;
                        }
                    }
                    for (let i = 0; i < game.bots.length; i++) {
                        let b = game.bots[i];
                        if (b.isAlive && !b.isImpostor && Math.hypot(game.player.x - b.x, game.player.y - b.y) < 70 && game.hasLineOfSight(game.player.x, game.player.y, b.x, b.y)) {
                            game.player.killCooldown = game.settings.killCooldown;
                            if (game.isHost) { b.isAlive = false; game.deadBodies.push({ x: b.x, y: b.y, color: b.color }); game.checkWinCondition(); }
                            else { game.sendToHost({ type: 'kill_request', target: 'bot', botId: i }); }
                            return;
                        }
                    }
                    return;
                }

                for (let i = 0; i < game.tasks.length; i++) {
                    let t = game.tasks[i];
                    if (t.active && t.owner === game.player.id && Math.hypot(game.player.x - t.x, game.player.y - t.y) < 70 && (!game.player.isAlive || game.hasLineOfSight(game.player.x, game.player.y, t.x, t.y))) {
                        t.active = false;
                        game.tasksCompleted++;
                        document.getElementById('taskCount').innerText = game.tasksCompleted;
                        game.sendToHost({ type: 'task_done', taskId: i });
                        if (game.isHost) game.checkWinCondition();
                        break;
                    }
                }
            },

            useVent: () => {
                if (!game.player.isAlive || !game.player.isImpostor || game.state !== 'PLAYING') return;

                if (game.player.inVent) {
                    game.player.inVent = false;
                    document.getElementById('ventHint').style.display = 'none';
                    return;
                }

                for (let i = 0; i < game.map.vents.length; i++) {
                    let v = game.map.vents[i];
                    if (Math.hypot(game.player.x - v.x, game.player.y - v.y) < 70) {
                        game.player.inVent = true;
                        game.player.currentVentIndex = i;
                        game.player.x = v.x; game.player.y = v.y;
                        document.getElementById('ventHint').style.display = 'block';
                        break;
                    }
                }
            },

            checkWinCondition: () => {
                if (!game.isHost || game.state === 'OVER') return;

                if (game.tasksCompleted >= game.totalTasks && game.totalTasks > 0) {
                    game.sendGameOver("CREW_WIN", "Alle Tasks erledigt! Crewmates gewinnen.");
                    return;
                }

                let livingCrew = 0;
                let livingImp = 0;

                if (game.player.isAlive) { game.player.isImpostor ? livingImp++ : livingCrew++; }
                Object.values(game.peers).forEach(p => { if (p.isAlive) p.isImpostor ? livingImp++ : livingCrew++; });
                game.bots.forEach(b => { if (b.isAlive) b.isImpostor ? livingImp++ : livingCrew++; });

                if (livingImp >= livingCrew) {
                    game.sendGameOver("IMP_WIN", "Die Impostors haben die Überhand gewonnen!");
                }
                else if (livingImp === 0) {
                    game.sendGameOver("CREW_WIN", "Alle Impostors wurden eliminiert!");
                }
            },

            sendGameOver: (winnerTeam, reason) => {
                let finalTitle = "DEFEAT";
                if (winnerTeam === "IMP_WIN" && game.player.isImpostor) finalTitle = "VICTORY";
                if (winnerTeam === "CREW_WIN" && !game.player.isImpostor) finalTitle = "VICTORY";

                game.endGame(finalTitle, reason);

                if (game.isHost) {
                    game.broadcast({ type: 'game_over', winnerTeam: winnerTeam, reason: reason });
                }
            },

            // --- MEETINGS & CHAT ---
            reportBody: () => {
                if (!game.player.isAlive || game.state !== 'PLAYING') return;
                const rName = game.user ? game.user.username : "Du";
                if (game.isHost) { game.startMeeting(rName); game.broadcast({ type: 'call_meeting', reporter: rName }); }
                else { game.sendToHost({ type: 'call_meeting', reporter: rName }); }
            },

            startMeeting: (reporterName) => {
                game.state = 'MEETING'; game.player.dx = 0; game.player.dy = 0; game.player.inVent = false;
                document.getElementById('ventHint').style.display = 'none';

                document.getElementById('hud').style.display = 'none';
                document.getElementById('taskBtn').style.display = 'none';
                document.getElementById('reportBtn').style.display = 'none';
                document.getElementById('ventBtn').style.display = 'none';

                document.getElementById('meetingScreen').style.display = 'flex';
                document.getElementById('meetingReporter').innerText = `${reporterName} hat gerufen!`;
                document.getElementById('chatMessages').innerHTML = '';

                if (game.isHost) {
                    game.meeting = { phase: 'discussion', timer: 15, votes: {}, hasVoted: false };
                    game.syncMeetingLoop();
                }
            },

            syncMeetingLoop: () => {
                if (!game.isHost || game.state !== 'MEETING') return;

                game.meeting.timer--;
                if (game.meeting.timer <= 0) {
                    if (game.meeting.phase === 'discussion') {
                        game.meeting.phase = 'voting'; game.meeting.timer = 30;
                    } else if (game.meeting.phase === 'voting') {
                        game.meeting.phase = 'results';
                        game.evaluateVotes();
                        return;
                    }
                }

                game.broadcast({ type: 'meeting_sync', meeting: game.meeting });
                game.renderMeetingUI(game.meeting);

                setTimeout(game.syncMeetingLoop, 1000);
            },

            renderMeetingUI: (data) => {
                const timerEl = document.getElementById('meetingTimer');
                if (data.phase === 'discussion') {
                    timerEl.innerText = `Besprechung: ${data.timer}s`; timerEl.style.color = '#fbc02d';
                    document.getElementById('skipVoteBtn').disabled = true;
                } else if (data.phase === 'voting') {
                    timerEl.innerText = `Abstimmen: ${data.timer}s`; timerEl.style.color = '#ff0000';
                    document.getElementById('skipVoteBtn').disabled = game.meeting.hasVoted || !game.player.isAlive;
                }

                const list = document.getElementById('votingList');
                list.innerHTML = '';

                const renderRow = (id, name, color, isAlive) => {
                    const votedMe = data.votes[id] ? `<span style="background:#555; padding:2px 6px; border-radius:10px; font-size:12px;">${data.votes[id]} Votes</span>` : '';
                    list.innerHTML += `
                        <div class="player-vote-row ${!isAlive ? 'dead' : ''}">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <div style="width:20px; height:20px; border-radius:50%; background:${color}"></div>
                                <span>${name} ${isAlive ? '' : '☠️'} ${data.phase === 'voting' ? votedMe : ''}</span>
                            </div>
                            ${game.player.isAlive && isAlive && data.phase === 'voting' && !game.meeting.hasVoted ? `<button class="vote-btn" onclick="game.castVote('${id}')">Vote</button>` : ''}
                        </div>
                    `;
                };

                renderRow(game.player.id, game.user ? game.user.username : "Du", game.player.color, game.player.isAlive);
                Object.keys(game.peers).forEach(id => { let p = game.peers[id]; renderRow(id, p.name, p.color, p.isAlive); });
                game.bots.forEach((b, i) => { renderRow(`bot_${i}`, `Bot_${i + 1}`, b.color, b.isAlive); });
            },

            castVote: (targetId) => {
                if (game.meeting.hasVoted || !game.player.isAlive) return;
                game.meeting.hasVoted = true;
                document.getElementById('skipVoteBtn').disabled = true;

                if (game.isHost) game.registerVote(targetId);
                else game.sendToHost({ type: 'vote_cast', voteTarget: targetId });
            },

            registerVote: (targetId) => {
                if (!game.meeting.votes[targetId]) game.meeting.votes[targetId] = 0;
                game.meeting.votes[targetId]++;
            },

            evaluateVotes: () => {
                if (!game.isHost) return;

                game.bots.forEach((b, i) => {
                    if (b.isAlive) {
                        const ops = ['skip', 'skip', game.player.id, ...Object.keys(game.peers), ...game.bots.map((_, idx) => `bot_${idx}`)];
                        game.registerVote(ops[Math.floor(Math.random() * ops.length)]);
                    }
                });

                let maxVotes = 0, ejected = null, tie = false;
                for (let [id, count] of Object.entries(game.meeting.votes)) {
                    if (count > maxVotes) { maxVotes = count; ejected = id; tie = false; }
                    else if (count === maxVotes) { tie = true; }
                }

                document.getElementById('meetingScreen').style.display = 'none';

                let msg = ""; let wasImp = false; let nobodyEjected = false;

                if (tie || ejected === 'skip' || !ejected) {
                    msg = "Niemand wurde rausgeworfen (Gleichstand oder Skip).";
                    nobodyEjected = true;
                } else {
                    if (ejected === game.player.id) {
                        game.player.isAlive = false; msg = (game.user ? game.user.username : "Du") + " wurde rausgeworfen."; wasImp = game.player.isImpostor;
                    } else if (ejected.startsWith('bot_')) {
                        const idx = parseInt(ejected.split('_')[1]);
                        game.bots[idx].isAlive = false; msg = `Bot_${idx + 1} wurde rausgeworfen.`; wasImp = game.bots[idx].isImpostor;
                    } else {
                        game.peers[ejected].isAlive = false; msg = `${game.peers[ejected].name} wurde rausgeworfen.`; wasImp = game.peers[ejected].isImpostor;
                    }
                    msg += `\n${wasImp ? 'War Impostor!' : 'War KEIN Impostor.'}`;
                }

                game.broadcast({ type: 'meeting_result', msg: msg, nobodyEjected: nobodyEjected });
                game.showEjection(msg, nobodyEjected);

                setTimeout(() => {
                    game.checkWinCondition();
                    if (game.state !== 'OVER') {
                        game.resetPositions();
                        game.player.killCooldown = game.settings.killCooldown;
                        game.bots.forEach(b => b.killCooldown = game.settings.killCooldown);
                        game.state = 'PLAYING';
                        document.getElementById('hud').style.display = 'block';
                    }
                }, 4000);
            },

            showEjection: (msg, nobodyEjected) => {
                document.getElementById('meetingScreen').style.display = 'none';
                const esc = document.getElementById('ejectScreen');
                esc.style.display = 'flex';
                document.getElementById('ejectText').innerText = msg;

                document.getElementById('ejectCharacter').style.display = nobodyEjected ? 'none' : 'block';

                setTimeout(() => { esc.style.display = 'none'; }, 3800);
            },

            sendChat: () => {
                const input = document.getElementById('chatInput');
                const msg = input.value.trim();
                if (!msg || !game.player.isAlive) return;
                input.value = "";
                const sender = game.user ? game.user.username : "Du";

                if (game.isHost) { game.receiveChat(sender, msg); game.broadcast({ type: 'chat_msg', sender, msg }); }
                else { game.sendToHost({ type: 'chat_msg', sender, msg }); }
            },

            receiveChat: (sender, msg) => {
                const div = document.getElementById('chatMessages');
                div.innerHTML += `<div><b style="color:var(--accent)">${sender}:</b> ${msg}</div>`;
                div.scrollTop = div.scrollHeight;
                if (game.isHost && sender !== (game.user ? game.user.username : "Du")) game.broadcast({ type: 'chat_msg', sender, msg });
            },

            update: () => {
                if (game.state !== 'PLAYING') return;

                // --- BERECHNUNG DER BEWEGUNG ---
                let moveDx = 0, moveDy = 0;
                if (game.keys['ArrowUp'] || game.keys['KeyW']) moveDy -= 1;
                if (game.keys['ArrowDown'] || game.keys['KeyS']) moveDy += 1;
                if (game.keys['ArrowLeft'] || game.keys['KeyA']) moveDx -= 1;
                if (game.keys['ArrowRight'] || game.keys['KeyD']) moveDx += 1;

                if (game.joystick.active) { moveDx = game.joystick.dx; moveDy = game.joystick.dy; }
                if (moveDx !== 0 && moveDy !== 0 && !game.joystick.active) { let len = Math.hypot(moveDx, moveDy); moveDx /= len; moveDy /= len; }

                const nextDx = moveDx * game.player.speed, nextDy = moveDy * game.player.speed;
                game.player.dx = nextDx;

                // --- BEWEGUNG (Lebende und Geister) ---
                if (game.player.inVent) {
                    if (game.ventSwitchCooldown > 0) game.ventSwitchCooldown--;

                    let switchDir = 0;
                    if (game.keys['ArrowRight'] || game.keys['KeyD'] || game.joystick.dx > 0.5) switchDir = 1;
                    if (game.keys['ArrowLeft'] || game.keys['KeyA'] || game.joystick.dx < -0.5) switchDir = -1;

                    if (switchDir !== 0 && game.ventSwitchCooldown <= 0) {
                        game.player.currentVentIndex = (game.player.currentVentIndex + switchDir + game.map.vents.length) % game.map.vents.length;
                        let v = game.map.vents[game.player.currentVentIndex];
                        game.player.x = v.x; game.player.y = v.y;
                        game.ventSwitchCooldown = 15;
                    }
                } else if (!game.player.isAlive) {
                    game.player.x += nextDx; game.player.y += nextDy;
                } else {
                    if (nextDx !== 0 && !game.checkCollision(game.player.x + nextDx, game.player.y, game.player.size)) game.player.x += nextDx;
                    if (nextDy !== 0 && !game.checkCollision(game.player.x, game.player.y + nextDy, game.player.size)) game.player.y += nextDy;
                }

                game.camera.x = game.player.x - canvas.width / 2;
                game.camera.y = game.player.y - canvas.height / 2;

                if (game.player.isAlive) {
                    if (game.player.killCooldown > 0) game.player.killCooldown--;

                    let showActionBtn = false, showReportBtn = false, showVentBtn = false;

                    for (let dead of game.deadBodies) {
                        if (Math.hypot(game.player.x - dead.x, game.player.y - dead.y) < 100 && game.hasLineOfSight(game.player.x, game.player.y, dead.x, dead.y)) {
                            showReportBtn = true; break;
                        }
                    }

                    if (game.player.isImpostor) {
                        for (let v of game.map.vents) {
                            if (Math.hypot(game.player.x - v.x, game.player.y - v.y) < 70) { showVentBtn = true; break; }
                        }
                        if (!game.player.inVent) {
                            for (let b of game.bots) { if (b.isAlive && !b.isImpostor && Math.hypot(game.player.x - b.x, game.player.y - b.y) < 70 && game.hasLineOfSight(game.player.x, game.player.y, b.x, b.y)) showActionBtn = true; }
                            Object.values(game.peers).forEach(p => { if (p.isAlive && !p.isImpostor && Math.hypot(game.player.x - p.x, game.player.y - p.y) < 70 && game.hasLineOfSight(game.player.x, game.player.y, p.x, p.y)) showActionBtn = true; });
                        }
                    } else {
                        for (let t of game.tasks) {
                            if (t.active && t.owner === game.player.id && Math.hypot(game.player.x - t.x, game.player.y - t.y) < 70 && game.hasLineOfSight(game.player.x, game.player.y, t.x, t.y)) showActionBtn = true;
                        }
                    }

                    const tBtn = document.getElementById('taskBtn');
                    tBtn.style.display = showActionBtn ? 'block' : 'none';
                    if (game.player.isImpostor) {
                        if (game.player.killCooldown > 0) {
                            tBtn.innerText = Math.ceil(game.player.killCooldown / 60);
                            tBtn.style.opacity = '0.5';
                        } else {
                            tBtn.innerText = "KILL"; tBtn.style.opacity = '1';
                        }
                    } else {
                        tBtn.innerText = "USE"; tBtn.style.opacity = '1';
                    }

                    document.getElementById('reportBtn').style.display = showReportBtn ? 'block' : 'none';
                    document.getElementById('ventBtn').style.display = showVentBtn ? 'block' : 'none';

                    if (game.keys['Space'] && showActionBtn) { game.keys['Space'] = false; game.doTask(); }
                    if (game.keys['KeyV'] && showVentBtn) { game.keys['KeyV'] = false; game.useVent(); }
                } else if (!game.player.isImpostor) {
                    let showActionBtn = false;
                    for (let t of game.tasks) {
                        if (t.active && t.owner === game.player.id && Math.hypot(game.player.x - t.x, game.player.y - t.y) < 70) showActionBtn = true;
                    }
                    const tBtn = document.getElementById('taskBtn');
                    tBtn.style.display = showActionBtn ? 'block' : 'none';
                    tBtn.innerText = "USE"; tBtn.style.opacity = '1';
                    if (game.keys['Space'] && showActionBtn) { game.keys['Space'] = false; game.doTask(); }
                }

                if (game.isHost) {
                    for (let b of game.bots) {
                        if (!b.isAlive) continue;
                        if (b.waitTimer > 0) { b.waitTimer--; continue; }

                        if (b.isImpostor) {
                            if (b.killCooldown > 0) b.killCooldown--;

                            if (b.task === 'goto_vent') {
                                let targetVent = null, ventDist = Infinity;
                                for (let v of game.map.vents) {
                                    let d = Math.hypot(b.x - v.x, b.y - v.y);
                                    if (d < ventDist) { targetVent = v; ventDist = d; }
                                }
                                if (ventDist < 20) {
                                    const otherVents = game.map.vents.filter(v => v !== targetVent);
                                    const exit = otherVents[Math.floor(Math.random() * otherVents.length)];
                                    if (exit) { b.x = exit.x; b.y = exit.y; b.tx = exit.x; b.ty = exit.y; }
                                    b.task = 'wander';
                                } else {
                                    if (targetVent) { b.tx = targetVent.x; b.ty = targetVent.y; }
                                }
                            }
                            else {
                                let target = null, shortestDist = Infinity;
                                const checkTarget = (t) => {
                                    if (t && t.isAlive && !t.isImpostor && game.hasLineOfSight(b.x, b.y, t.x, t.y)) {
                                        let dist = Math.hypot(t.x - b.x, t.y - b.y);
                                        if (dist < shortestDist) { target = t; shortestDist = dist; }
                                    }
                                };

                                checkTarget(game.player);
                                Object.values(game.peers).forEach(checkTarget);
                                for (let ob of game.bots) { if (!ob.isImpostor) checkTarget(ob); }

                                if (shortestDist < 300 && target) { b.tx = target.x; b.ty = target.y; }

                                if (shortestDist < b.size * 2.5 && b.killCooldown <= 0 && target) {
                                    target.isAlive = false;
                                    game.deadBodies.push({ x: target.x, y: target.y, color: target.color });
                                    b.killCooldown = game.settings.killCooldown;
                                    game.checkWinCondition();

                                    const esc = game.getRandomSafePos(); b.tx = esc.x; b.ty = esc.y;
                                }
                            }
                        }

                        const angle = Math.atan2(b.ty - b.y, b.tx - b.x);
                        let bMoveX = Math.cos(angle) * b.speed, bMoveY = Math.sin(angle) * b.speed;
                        let moved = false;

                        if (!game.checkCollision(b.x + bMoveX, b.y, b.size)) { b.x += bMoveX; moved = true; }
                        if (!game.checkCollision(b.x, b.y + bMoveY, b.size)) { b.y += bMoveY; moved = true; }

                        if (!moved || Math.hypot(b.tx - b.x, b.ty - b.y) < 20) b.stuckTimer++;
                        else b.stuckTimer = 0;

                        if (b.stuckTimer > 15 && b.task !== 'goto_vent') {
                            const randAngle = Math.random() * Math.PI * 2;
                            b.tx = b.x + Math.cos(randAngle) * 150;
                            b.ty = b.y + Math.sin(randAngle) * 150;
                            b.stuckTimer = 0;
                            if (!b.isImpostor && Math.random() < 0.3) b.waitTimer = 120;
                        }
                    }
                }

                const now = Date.now();
                if (now - game.lastSync > 50) {
                    if (game.isHost) {
                        if (game.state !== 'PLAYING') return;

                        let stateData = {
                            type: 'host_update',
                            hostPlayer: { x: game.player.x, y: game.player.y, dx: game.player.dx, isAlive: game.player.isAlive, inVent: game.player.inVent },
                            peers: {}, bots: game.bots, tasks: game.tasks, tasksCompleted: game.tasksCompleted, deadBodies: game.deadBodies
                        };
                        Object.keys(game.peers).forEach(id => {
                            let p = game.peers[id];
                            stateData.peers[id] = { x: p.x, y: p.y, dx: p.dx, isAlive: p.isAlive, inVent: p.inVent, name: p.name, color: p.color };
                        });
                        game.broadcast(stateData);
                    } else {
                        game.sendToHost({
                            type: 'guest_update',
                            player: {
                                x: game.player.x, y: game.player.y, dx: game.player.dx,
                                isAlive: game.player.isAlive, inVent: game.player.inVent,
                                color: game.player.color, name: game.user ? game.user.username : 'Guest'
                            }
                        });
                    }
                    game.lastSync = now;
                }
                game.frame++;
            },

            draw: () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.save();

                let camX = game.camera.x; let camY = game.camera.y;
                if (!game.player.isAlive) ctx.globalAlpha = 0.6;
                ctx.translate(-camX, -camY);

                ctx.fillStyle = '#2c3338'; ctx.fillRect(0, 0, game.map.w, game.map.h);
                ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1;
                for (let i = 0; i < game.map.w; i += 80) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, game.map.h); ctx.stroke(); }
                for (let i = 0; i < game.map.h; i += 80) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(game.map.w, i); ctx.stroke(); }

                for (let f of (game.map.floors || [])) {
                    ctx.fillStyle = f.bg;
                    ctx.fillRect(f.x, f.y, f.w, f.h);
                    if (f.icon) {
                        ctx.font = `${Math.min(f.w, f.h) * 0.6}px sans-serif`;
                        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText(f.icon, f.x + f.w / 2, f.y + f.h / 2);
                    }
                }

                ctx.fillStyle = '#333'; ctx.strokeStyle = '#000';
                for (let v of game.map.vents) {
                    if (game.player.inVent || (!game.player.isAlive) || game.hasLineOfSight(game.player.x, game.player.y, v.x, v.y)) {
                        ctx.fillRect(v.x - 20, v.y - 10, 40, 20); ctx.strokeRect(v.x - 20, v.y - 10, 40, 20);
                        ctx.beginPath(); ctx.moveTo(v.x - 15, v.y); ctx.lineTo(v.x + 15, v.y); ctx.stroke();
                        if (game.player.inVent && game.player.isImpostor && Math.hypot(game.player.x - v.x, game.player.y - v.y) > 10) {
                            ctx.fillStyle = "rgba(255,0,0,0.5)"; ctx.beginPath(); ctx.arc(v.x, v.y, 30, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#333';
                        }
                    }
                }

                ctx.fillStyle = '#111'; ctx.strokeStyle = '#444'; ctx.lineWidth = 4;
                for (let w of game.map.walls) {
                    ctx.fillStyle = w.bg || '#111';
                    ctx.fillRect(w.x, w.y, w.w, w.h);
                    ctx.strokeRect(w.x, w.y, w.w, w.h);
                    if (w.icon) {
                        ctx.font = `${Math.min(w.w, w.h) * 0.5}px sans-serif`;
                        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText(w.icon, w.x + w.w / 2, w.y + w.h / 2);
                    }
                }

                for (let dead of game.deadBodies) {
                    if (!game.player.isAlive || game.hasLineOfSight(game.player.x, game.player.y, dead.x, dead.y)) {
                        ctx.fillStyle = dead.color; ctx.beginPath(); ctx.arc(dead.x, dead.y, 14, 0, Math.PI); ctx.fill();
                        ctx.fillStyle = '#777'; ctx.beginPath(); ctx.arc(dead.x, dead.y - 3, 5, 0, Math.PI * 2); ctx.fill();
                    }
                }

                if (!game.player.isImpostor) {
                    for (let t of game.tasks) {
                        if (t.active && t.owner === game.player.id && (!game.player.isAlive || game.hasLineOfSight(game.player.x, game.player.y, t.x, t.y))) {
                            ctx.fillStyle = 'rgba(255, 255, 0, 0.2)'; ctx.beginPath(); ctx.arc(t.x, t.y, 70, 0, Math.PI * 2); ctx.fill();
                            ctx.fillStyle = '#fbc02d'; ctx.fillRect(t.x - 15, t.y - 15, 30, 30);
                            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(t.x - 15, t.y - 15, 30, 30);
                        }
                    }
                }

                const drawOthers = (obj, isBot) => {
                    if (obj.isAlive && !obj.inVent && (!game.player.isAlive || game.hasLineOfSight(game.player.x, game.player.y, obj.x, obj.y))) {
                        game.drawCharacter(obj.x, obj.y, obj.size || 14, obj.color, !isBot, obj.isImpostor, obj.dx, obj.name);
                    }
                };
                game.bots.forEach(b => drawOthers(b, true));
                Object.values(game.peers).forEach(p => drawOthers(p, false));

                // Der Host hat eine ID, wenn er durch die drawOthers Schleife rutscht, fehlt er bei Gästen oft. 
                // Host wird von den Gästen in peers gespeichert, also ist er abgedeckt.
                if (game.player.isAlive && !game.player.inVent) {
                    game.drawCharacter(game.player.x, game.player.y, game.player.size, game.player.color, true, game.player.isImpostor, game.player.dx, game.user ? game.user.username : 'Du');
                }

                for (let d of (game.map.decor || [])) {
                    if (d.bg && d.bg !== 'transparent') {
                        ctx.fillStyle = d.bg;
                        ctx.fillRect(d.x, d.y, d.w, d.h);
                    }
                    if (d.icon) {
                        ctx.font = `${Math.min(d.w, d.h) * 0.8}px sans-serif`;
                        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText(d.icon, d.x + d.w / 2, d.y + d.h / 2);
                    }
                }

                ctx.restore();

                if (game.player.isAlive) {
                    ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0);
                    let cx = canvas.width / 2, cy = canvas.height / 2;
                    let grad = ctx.createRadialGradient(cx, cy, 80, cx, cy, 500);
                    grad.addColorStop(0, "rgba(0,0,0,0)"); grad.addColorStop(0.4, "rgba(0,0,0,0.2)"); grad.addColorStop(1, "rgba(0,0,0,0.85)");
                    ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.restore();
                }

                if (game.joystick.active) {
                    ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0);
                    ctx.beginPath(); ctx.arc(game.joystick.originX, game.joystick.originY, 50, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)'; ctx.fill(); ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.lineWidth = 2; ctx.stroke();
                    ctx.beginPath(); ctx.arc(game.joystick.originX + (game.joystick.dx * 50), game.joystick.originY + (game.joystick.dy * 50), 25, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)'; ctx.fill(); ctx.restore();
                }
            },

            drawCharacter: (x, y, size, color, isRealPlayer, isImpostor, dx, nameOverride = '') => {
                ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.ellipse(x, y + size - 2, size, size / 2.5, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = color; ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.stroke();

                ctx.fillStyle = '#90caf9';
                let lookOffset = 0;
                if (dx > 0.5) lookOffset = 4;
                else if (dx < -0.5) lookOffset = -4;
                ctx.beginPath(); ctx.ellipse(x + lookOffset, y - 3, size * 0.6, size * 0.35, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

                if (isRealPlayer) {
                    const isKnownImpostor = isImpostor && (!game.player.isAlive || game.player.isImpostor);
                    ctx.fillStyle = isKnownImpostor ? '#ff0000' : '#fff';
                    ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
                    ctx.shadowColor = "black"; ctx.shadowBlur = 3; ctx.lineWidth = 2;
                    ctx.fillText(nameOverride || 'Player', x, y - size - 8); ctx.shadowBlur = 0;
                }
            },

            loop: () => { if (game.running) { game.update(); game.draw(); requestAnimationFrame(game.loop); } },
            endGame: (t, r) => {
                game.running = false; game.state = 'OVER';
                document.getElementById('taskBtn').style.display = 'none';
                document.getElementById('reportBtn').style.display = 'none';
                document.getElementById('ventBtn').style.display = 'none';
                document.getElementById('uiLayer').style.pointerEvents = 'auto';
                document.getElementById('gameOverScreen').style.display = 'block';
                document.getElementById('endTitle').innerText = t;
                document.getElementById('endTitle').style.color = t === "VICTORY" ? "#4CAF50" : "#d32f2f";
                document.getElementById('endReason').innerText = r;
            }
        };

        document.getElementById('hostBtn').onclick = game.hostLobby;
        document.getElementById('joinBtn').onclick = game.joinLobby;
        document.getElementById('startBtn').onclick = game.startSolo;
        game.init();
    </script>
</body>

</html>
