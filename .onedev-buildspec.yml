version: 47
jobs:
- name: Publish Site
  steps:
  - type: CheckoutStep
    name: Get Code
    cloneCredential:
      type: DefaultCredential
    withLfs: false
    withSubmodules: false
    condition: SUCCESSFUL
    optional: false
  - type: PublishSiteStep
    name: Publish Site
    artifacts: '*'
    condition: SUCCESSFUL
    optional: false
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 14400
- name: Push to Github
  steps:
  - type: CheckoutStep
    name: Get Code
    cloneCredential:
      type: DefaultCredential
    withLfs: false
    withSubmodules: false
    condition: SUCCESSFUL
    optional: false
  - type: PushRepository
    name: Push to Github
    remoteUrl: https://github.com/Limo123123/limazon
    userName: Limo123123
    passwordSecret: gh
    force: true
    condition: SUCCESSFUL
    optional: false
  triggers:
  - type: BranchUpdateTrigger
    userMatch: anyone
    projects: limazon
  retryCondition: never
  maxRetries: 3
  retryDelay: 30
  timeout: 14400
