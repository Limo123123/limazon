<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Limazon+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0f172a;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hide-scroll::-webkit-scrollbar { display: none; }

        /* Toast Styling */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(12px); border-left: 4px solid #10b981; color: white; padding: 16px 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); opacity: 0; animation: fadein 0.3s forwards; font-size: 0.875rem; font-weight: bold; }
        .toast.error { border-left-color: #ef4444; }
        @keyframes fadein { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }

        /* Glow für aktive Abos */
        .active-sub {
            border-color: #10b981 !important;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
            background: linear-gradient(145deg, rgba(16, 185, 129, 0.05), rgba(30, 41, 59, 0.7));
        }
    </style>
</head>
<body class="min-h-screen flex flex-col max-w-3xl mx-auto relative overflow-y-auto bg-slate-900 p-4 pb-24 hide-scroll">

    <div id="toast-container"></div>

    <header class="py-6 flex justify-between items-center z-10 border-b border-slate-800 mb-6">
        <div>
            <h1 class="text-2xl font-bold tracking-tight text-white flex items-center gap-2">
                <span class="text-cyan-400">💎</span> Limazon<span class="text-cyan-400">+</span>
            </h1>
            <p class="text-xs text-slate-400 mt-1">Hol dir die täglichen Boosts</p>
        </div>
        <button onclick="window.history.back()" class="text-sm font-bold text-slate-400 hover:text-white transition bg-slate-800 px-3 py-1.5 rounded-lg">Zurück</button>
    </header>

    <main class="flex-grow z-0">
        
        <div class="glass p-6 rounded-2xl shadow-xl mb-6 border-t-4 border-t-cyan-500 relative overflow-hidden">
            <div class="absolute -right-10 -top-10 text-9xl opacity-5 drop-shadow-2xl pointer-events-none">✨</div>
            <h2 class="text-sm uppercase text-cyan-400 font-bold mb-2 tracking-wider flex items-center gap-2">
                Automatische Abrechnung
            </h2>
            <p class="text-xs text-slate-400 leading-relaxed max-w-lg">
                Die Kosten für deine aktiven Abonnements werden <strong class="text-white">jeden Tag automatisch</strong> von deinem Konto abgebucht. Ist dein Konto nicht gedeckt, werden die Abos sofort storniert.
            </p>
        </div>

        <div id="subs-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <p class="col-span-full text-center text-slate-500 text-sm py-8">Lade Angebote...</p>
        </div>

    </main>

    <script>
        const API_BASE = 'https://api.limazon.v6.rocks/api';
        const fetchOpts = { credentials: 'include', headers: { 'Content-Type': 'application/json' } };

        async function init() {
            try {
                const authRes = await fetch(`${API_BASE}/auth/me`, fetchOpts);
                if (!authRes.ok) return showToast("Bitte logge dich ein.", "error");
                loadSubscriptions();
            } catch (e) {
                showToast("Verbindungsfehler.", "error");
            }
        }

        async function loadSubscriptions() {
            const container = document.getElementById('subs-container');
            try {
                const res = await fetch(`${API_BASE}/subscriptions`, fetchOpts);
                const data = await res.json();

                if (!res.ok) throw new Error(data.error);

                container.innerHTML = '';

                data.catalog.forEach(sub => {
                    const isActive = data.active.includes(sub.id);
                    
                    const btnClass = isActive 
                        ? 'bg-rose-500/10 text-rose-400 border-rose-500/30 hover:bg-rose-600 hover:text-white' 
                        : 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/20 hover:bg-emerald-500 border-transparent';
                    
                    const btnText = isActive ? 'Kündigen' : 'Abonnieren';
                    const activeBadge = isActive 
                        ? `<div class="absolute top-4 right-4 bg-emerald-500 text-white text-[10px] font-bold px-2 py-1 rounded shadow-lg uppercase tracking-wider animate-pulse">Aktiv</div>` 
                        : '';

                    container.innerHTML += `
                        <div class="glass p-6 rounded-2xl border border-slate-700 flex flex-col relative transition duration-300 ${isActive ? 'active-sub' : 'hover:border-cyan-500/50'}">
                            ${activeBadge}
                            <div class="text-5xl mb-4 drop-shadow-lg">${sub.icon}</div>
                            <h3 class="text-xl font-bold text-white mb-1">${sub.name}</h3>
                            <div class="text-cyan-400 font-mono font-bold mb-3 bg-cyan-500/10 inline-block px-3 py-1 rounded-lg w-max">
                                $${sub.costPerDay.toLocaleString('de-DE')} / Tag
                            </div>
                            <p class="text-xs text-slate-400 mb-6 flex-grow leading-relaxed">${sub.desc}</p>
                            
                            <button onclick="toggleSub('${sub.id}', '${sub.name}', ${isActive}, ${sub.costPerDay})" 
                                class="w-full border ${btnClass} font-bold py-3 rounded-xl transition active:scale-95 text-sm uppercase tracking-wide">
                                ${btnText}
                            </button>
                        </div>
                    `;
                });

            } catch (e) {
                container.innerHTML = '<p class="col-span-full text-center text-rose-500 font-bold">Fehler beim Laden der Abos.</p>';
            }
        }

        async function toggleSub(subId, name, isActive, cost) {
            const actionText = isActive ? `Willst du ${name} wirklich kündigen?` : `Willst du ${name} für $${cost} pro Tag abonnieren? (Der erste Tag wird sofort fällig!)`;
            if (!confirm(actionText)) return;

            try {
                const res = await fetch(`${API_BASE}/subscriptions/toggle`, {
                    ...fetchOpts,
                    method: 'POST',
                    body: JSON.stringify({ subId })
                });
                const data = await res.json();

                if (res.ok) {
                    showToast(data.message, "success");
                    loadSubscriptions(); // UI sofort updaten
                } else {
                    showToast(data.error, "error");
                }
            } catch (e) {
                showToast("Fehler bei der Transaktion.", "error");
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span class="mr-2">${type === 'success' ? '✅' : '❌'}</span> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        window.onload = init;
    </script>
</body>
</html>
