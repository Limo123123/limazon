<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Limo Finance Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="style_0.css?v=FhbGyXdi">
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 glass border-t-0 border-x-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                
                <div class="flex items-center gap-4">
                    <button onclick="window.location.href='/'" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition text-gray-400 hover:text-white">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <div>
                        <h1 class="text-2xl font-black tracking-tighter text-white">
                            LIMO<span class="text-blue-500">EX</span>
                        </h1>
                        <div class="flex items-center gap-2 mt-0.5">
                            <span class="relative flex h-2 w-2">
                              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                              <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                            </span>
                            <span class="text-[10px] text-green-500 font-mono font-bold tracking-widest uppercase">Live Market</span>
                        </div>
                    </div>
                </div>

                <div class="text-right hidden sm:block">
                    <div class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Gesamtvermögen</div>
                    <div class="text-3xl font-bold font-mono text-white tracking-tight" id="header-networth">
                        $ ---
                    </div>
                </div>
            </div>

            <div class="flex gap-8 mt-2 overflow-x-auto pb-3 no-scrollbar">
                <button onclick="switchTab('market')" id="btn-market" class="nav-item active text-sm font-bold uppercase tracking-wider whitespace-nowrap">Aktienmarkt</button>
                <button onclick="switchTab('crypto')" id="btn-crypto" class="nav-item text-sm font-bold uppercase tracking-wider whitespace-nowrap">Krypto</button>
                <button onclick="switchTab('portfolio')" id="btn-portfolio" class="nav-item text-sm font-bold uppercase tracking-wider whitespace-nowrap">Mein Portfolio</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">

        <div id="view-market" class="space-y-6">
            <div class="search-container rounded-2xl p-2 flex items-center gap-3 sticky top-32 z-40 backdrop-blur-md">
                <div class="pl-3 text-gray-500">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <input type="text" id="stock-search" onkeyup="handleSearch()" 
                    class="w-full bg-transparent border-none text-white text-lg p-2 focus:outline-none placeholder-gray-600 font-medium" 
                    placeholder="Suche nach Apple, Pizza, Gold... (4000+ Assets)">
            </div>

            <div id="stocks-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                <div class="col-span-full py-32 text-center">
                    <div class="loader mx-auto mb-4"></div>
                    <p class="text-gray-500 text-sm font-mono animate-pulse">Lade Markt-Daten...</p>
                </div>
            </div>
        </div>

        <div id="view-crypto" class="hidden space-y-6">
            <h2 class="text-2xl font-bold text-white mb-6">Kryptowährungen</h2>
            <div id="crypto-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="view-portfolio" class="hidden space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="glass rounded-3xl p-8 flex flex-col items-center justify-center relative min-h-[350px]">
                    <h3 class="absolute top-6 left-6 text-xs font-bold text-gray-500 uppercase tracking-widest">Asset Verteilung</h3>
                    <div class="w-56 h-56 relative">
                        <canvas id="portfolioChart"></canvas>
                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none flex-col">
                            <span class="text-xs text-gray-500 uppercase">Total</span>
                            <span class="text-2xl font-bold text-white tracking-tighter" id="pf-chart-total">$$$</span>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2 space-y-6">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="glass rounded-2xl p-6 bg-gradient-to-br from-green-500/10 to-transparent border-green-500/20 relative overflow-hidden group">
                            <div class="absolute -right-6 -top-6 w-24 h-24 bg-green-500/20 rounded-full blur-2xl group-hover:bg-green-500/30 transition"></div>
                            <div class="relative z-10">
                                <div class="text-xs text-gray-400 uppercase font-bold mb-1">Verfügbares Bargeld</div>
                                <div class="text-3xl font-bold text-white font-mono" id="stat-cash">$ 0.00</div>
                            </div>
                        </div>
                        <div class="glass rounded-2xl p-6 bg-gradient-to-br from-purple-500/10 to-transparent border-purple-500/20 relative overflow-hidden group">
                            <div class="absolute -right-6 -top-6 w-24 h-24 bg-purple-500/20 rounded-full blur-2xl group-hover:bg-purple-500/30 transition"></div>
                            <div class="relative z-10">
                                <div class="text-xs text-gray-400 uppercase font-bold mb-1">Investiertes Kapital</div>
                                <div class="text-3xl font-bold text-white font-mono" id="stat-invested">$ 0.00</div>
                            </div>
                        </div>
                    </div>

                    <div class="glass rounded-3xl overflow-hidden">
                        <div class="px-6 py-4 border-b border-white/5 bg-white/5 backdrop-blur-md sticky top-0 z-10">
                            <h3 class="font-bold text-white text-sm uppercase tracking-wider">Deine Assets</h3>
                        </div>
                        <div id="portfolio-list" class="divide-y divide-white/5 max-h-[400px] overflow-y-auto bg-black/20"></div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div id="trade-modal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-xl transition-opacity opacity-0" id="modal-bg" onclick="closeTradeModal()"></div>
        
        <!-- FIX: max-h und overflow-y-auto hinzugefügt, um Abschneiden der Buttons bei Tastatur-Aktivierung zu verhindern -->
        <div class="absolute bottom-0 sm:top-1/2 sm:left-1/2 sm:-translate-x-1/2 sm:-translate-y-1/2 w-full sm:w-[480px] max-h-[92vh] sm:max-h-[85vh] overflow-y-auto glass border-t sm:border border-white/10 sm:rounded-3xl p-0 shadow-[0_0_50px_rgba(0,0,0,0.8)] transform translate-y-full sm:translate-y-10 opacity-0 transition-all duration-300" id="modal-content">
            
            <div class="p-6 pb-0 flex justify-between items-start">
                <div class="flex items-center gap-5">
                    <div id="modal-icon" class="w-16 h-16 rounded-2xl bg-gray-800 shadow-2xl flex items-center justify-center text-3xl overflow-hidden border border-white/10"></div>
                    <div>
                        <h3 class="text-2xl font-black text-white leading-none tracking-tight" id="modal-title">-</h3>
                        <div class="flex items-center gap-2 mt-1.5">
                            <span class="text-xs font-bold bg-white/10 px-2 py-0.5 rounded text-gray-300" id="modal-symbol">SYMB</span>
                            <span class="text-xs text-blue-400 font-mono" id="modal-type">STOCK</span>
                        </div>
                    </div>
                </div>
                <button onclick="closeTradeModal()" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/20 transition text-gray-400 hover:text-white">✕</button>
            </div>

            <div class="h-40 w-full mt-6 relative">
                <div class="absolute inset-x-0 bottom-0 h-20 bg-gradient-to-t from-[var(--glass-panel)] to-transparent z-10"></div>
                <canvas id="mainChart"></canvas>
            </div>

            <div class="px-6 relative z-20 -mt-6">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <div class="text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1">Aktueller Kurs</div>
                        <div class="text-4xl font-black text-white font-mono tracking-tighter" id="modal-price">$0.00</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1">Dein Besitz</div>
                        <div class="text-xl font-bold text-white font-mono" id="modal-owned">0</div>
                    </div>
                </div>

                <div class="bg-black/40 rounded-2xl p-2 border border-white/10 flex items-center mb-4 ring-1 ring-white/5 focus-within:ring-blue-500/50 transition-all">
                    <input type="number" id="trade-amount" class="w-full bg-transparent text-white font-mono text-2xl font-bold outline-none p-3 placeholder-gray-700" placeholder="0" oninput="updateTotal()">
                    <div class="pr-4 text-xs font-bold text-gray-500 uppercase tracking-widest">Menge</div>
                </div>

                <div class="flex justify-between text-xs font-medium text-gray-400 mb-6 px-2">
                    <span>Transaktionsvolumen:</span>
                    <span class="font-mono text-white font-bold" id="trade-total">$0.00</span>
                </div>

                <div class="flex justify-between gap-3 mb-6">
                    <button onclick="executeTrade('buy')" class="flex-1 group relative overflow-hidden bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-green-900/20 active:scale-95">
                        <span class="relative z-10">KAUFEN</span>
                        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-500"></div>
                    </button>
                    <button onclick="executeTrade('sell')" class="flex-1 group relative overflow-hidden bg-red-600 hover:bg-red-500 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-red-900/20 active:scale-95">
                        <span class="relative z-10">VERKAUFEN</span>
                        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-500"></div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script_0.js?v=hXdYEjMh"></script>
</body>
</html>
