<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Limo Post</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_0.css?v=w7E9Pc6i">
</head>
<body class="min-h-screen flex flex-col max-w-md mx-auto relative overflow-y-auto bg-slate-900 p-4 pb-24 hide-scroll">

    <header class="py-6 flex justify-between items-center z-10 border-b border-slate-800 mb-6">
        <div>
            <h1 class="text-2xl font-bold tracking-tight text-white flex items-center gap-2">
                <span class="text-orange-500">🚚</span> Limo Post
            </h1>
            <p class="text-xs text-slate-400 mt-1">Versende Items aus deinem Inventar</p>
        </div>
        <button onclick="window.history.back()" class="text-sm font-bold text-slate-400 hover:text-white transition bg-slate-800 px-3 py-1.5 rounded-lg">Zurück</button>
    </header>

    <main class="flex-grow space-y-6 z-0">
        
        <div class="glass p-5 rounded-2xl shadow-xl">
            <h2 class="text-sm uppercase text-orange-400 font-bold mb-4 tracking-wider">1. Was verschicken?</h2>
            <div class="space-y-3">
                <select id="product-select" class="input-dark w-full p-3 rounded-xl text-sm font-medium">
                    <option value="">Lade Inventar...</option>
                </select>
                <div class="flex items-center gap-3">
                    <label class="text-slate-400 text-sm font-bold w-1/3">Menge:</label>
                    <input type="number" id="quantity" value="1" min="1" class="input-dark w-2/3 p-3 rounded-xl text-sm font-mono text-center">
                </div>
            </div>
        </div>

        <div class="glass p-5 rounded-2xl shadow-xl">
            <h2 class="text-sm uppercase text-orange-400 font-bold mb-4 tracking-wider">2. An wen?</h2>
            <div class="relative">
                <span class="absolute left-4 top-3 text-slate-400 font-bold">@</span>
                <input type="text" id="target-username" placeholder="Username" class="input-dark w-full p-3 pl-8 rounded-xl text-sm font-medium" autocomplete="off">
            </div>
        </div>

        <div class="glass p-5 rounded-2xl shadow-xl">
            <h2 class="text-sm uppercase text-orange-400 font-bold mb-4 tracking-wider">3. Lieferdienst</h2>
            <div id="providers-container" class="grid grid-cols-2 gap-3">
                <p class="text-slate-500 text-sm col-span-2 text-center py-2">Lade Tarife...</p>
            </div>
        </div>

        <div class="space-y-3">
            <button id="send-btn" onclick="sendPackage()" class="w-full bg-gradient-to-r from-orange-600 to-red-600 text-white font-bold p-4 rounded-xl hover:from-orange-500 hover:to-red-500 transition shadow-lg shadow-orange-600/20 active:scale-95 flex items-center justify-center gap-2">
                <span>📦</span> Paket kostenpflichtig absenden
            </button>
            
            <button id="send-all-btn" onclick="sendAllInventory()" class="w-full bg-slate-800 text-slate-300 border border-slate-700 font-bold p-4 rounded-xl hover:bg-rose-600 hover:text-white hover:border-rose-500 transition active:scale-95 flex items-center justify-center gap-2">
                <span>🚚</span> Kompletten Umzug starten (3x Tarif)
            </button>
        </div>

    </main>

    <script src="script_0.js?v=VN7PEH3S"></script>
</body>
</html>
