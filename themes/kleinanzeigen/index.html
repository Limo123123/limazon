<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limo Kleinanzeigen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script_0.js?v=5gpZ8ngK"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen flex flex-col overflow-hidden">

    <header class="bg-brand text-white shadow-md z-50 flex-shrink-0">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold cursor-pointer flex items-center gap-2" onclick="showView('marketplace')">
                🛒 Limo Kleinanzeigen
            </h1>
            <nav class="space-x-1 md:space-x-2 flex items-center text-sm md:text-base">
                <button onclick="showView('marketplace')" class="hover:bg-brandHover px-2 py-2 rounded font-semibold transition">Stöbern</button>
                <button onclick="showView('dashboard')" class="hover:bg-brandHover px-2 py-2 rounded font-semibold transition">Mein Profil & Chats</button>
                <button onclick="showView('createAd')" class="bg-white text-brand px-3 py-2 rounded font-bold hover:bg-gray-50 transition shadow ml-2">
                    + Anzeige
                </button>
            </nav>
        </div>
    </header>

    <main class="flex-grow overflow-auto p-4 md:p-8">
        
        <section id="marketplace-view" class="max-w-7xl mx-auto hidden">
            <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">Neueste Anzeigen</h2>
            <div id="ads-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </section>

        <section id="createAd-view" class="hidden max-w-3xl mx-auto bg-white p-6 rounded-xl shadow-lg border border-gray-200">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Was möchtest du verkaufen?</h2>
            
            <form id="create-ad-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Art</label>
                        <select id="ad-type" onchange="toggleLimazonFields()" class="w-full border border-gray-300 p-3 rounded focus:ring-2 focus:ring-brand outline-none bg-white font-semibold">
                            <option value="real">📦 Echtes Objekt (Physisch)</option>
                            <option value="limazon">💎 Digitales Limazon Item</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Preis ($)</label>
                        <input type="number" id="ad-price" step="0.01" min="0.01" required class="w-full border border-gray-300 p-3 rounded focus:ring-2 focus:ring-brand outline-none font-bold text-brand">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Titel</label>
                    <input type="text" id="ad-title" required class="w-full border border-gray-300 p-3 rounded focus:ring-2 focus:ring-brand outline-none">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Beschreibung</label>
                    <textarea id="ad-desc" required rows="4" class="w-full border border-gray-300 p-3 rounded focus:ring-2 focus:ring-brand outline-none"></textarea>
                </div>

                <div id="image-upload-section" class="bg-gray-50 p-4 rounded-lg border border-dashed border-gray-300 text-center">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Artikelbild</label>
                    <input type="hidden" id="ad-image-url" required>
                    <div id="image-preview-container" class="hidden mb-4 flex justify-center">
                        <img id="final-image-preview" class="max-h-48 rounded shadow">
                    </div>
                    <label class="cursor-pointer bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded font-semibold transition">
                        📸 Bild hochladen
                        <input type="file" id="image-input" accept="image/*" class="hidden">
                    </label>
                </div>

                <div id="limazon-fields" class="hidden grid-cols-1 md:grid-cols-2 gap-4 p-4 bg-blue-50 border border-blue-100 rounded-lg">
                    <div>
                        <label class="block text-sm font-bold text-blue-900 mb-1">Inventar Item</label>
                        <select id="ad-inventory-select" class="w-full border border-blue-200 p-3 rounded outline-none"></select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-blue-900 mb-1">Menge</label>
                        <input type="number" id="ad-quantity" value="1" min="1" class="w-full border border-blue-200 p-3 rounded outline-none">
                    </div>
                </div>

                <button type="submit" class="w-full bg-brand text-white font-bold py-4 rounded-lg hover:bg-brandHover shadow-lg transition text-lg">
                    🚀 Veröffentlichen
                </button>
                <div id="form-error" class="text-red-500 text-sm mt-2 hidden text-center font-semibold"></div>
            </form>
        </section>

        <section id="dashboard-view" class="hidden max-w-7xl mx-auto h-full flex flex-col md:flex-row gap-6">
            
            <div class="w-full md:w-1/3 flex flex-col gap-6 h-full overflow-y-auto">
                <div class="bg-white rounded-xl shadow p-4 border border-gray-200">
                    <h3 class="font-bold text-lg mb-3">Meine Anzeigen</h3>
                    <div id="my-ads-list" class="space-y-3"></div>
                </div>
                
                <div class="bg-white rounded-xl shadow p-4 border border-gray-200 flex-grow">
                    <h3 class="font-bold text-lg mb-3">Nachrichten</h3>
                    <div id="chat-list" class="space-y-2"></div>
                </div>
            </div>

            <div class="w-full md:w-2/3 bg-white rounded-xl shadow border border-gray-200 flex flex-col h-[60vh] md:h-full relative">
                <div id="chat-header" class="bg-gray-50 p-4 border-b font-bold text-gray-800 rounded-t-xl flex justify-between items-center">
                    <span>Wähle einen Chat aus</span>
                    <button id="make-offer-btn" onclick="promptOffer()" class="hidden bg-green-500 text-white text-xs px-3 py-1 rounded hover:bg-green-600 transition shadow">
                        💰 Angebot senden
                    </button>
                </div>
                
                <div id="chat-messages" class="flex-grow p-4 overflow-y-auto bg-gray-50 flex flex-col gap-3">
                    </div>
                
                <form id="chat-form" class="p-3 bg-white border-t flex gap-2 rounded-b-xl">
                    <input type="text" id="chat-input" disabled placeholder="Nachricht eingeben..." class="flex-grow border border-gray-300 rounded-full px-4 outline-none focus:ring-2 focus:ring-brand">
                    <button type="submit" disabled id="chat-send-btn" class="bg-brand text-white rounded-full p-2 w-10 h-10 flex items-center justify-center hover:bg-brandHover disabled:opacity-50">
                        ➤
                    </button>
                </form>
            </div>
        </section>

    </main>

    <div id="ad-details-modal" class="fixed inset-0 bg-black bg-opacity-80 z-[60] hidden flex flex-col items-center justify-center p-4 md:p-8">
        <div class="bg-white rounded-xl w-full max-w-4xl flex flex-col max-h-full overflow-hidden shadow-2xl relative">
            <button onclick="closeAdDetails()" class="absolute top-4 right-4 bg-black bg-opacity-50 text-white rounded-full w-8 h-8 flex items-center justify-center hover:bg-red-600 transition z-10 font-bold">&times;</button>
            
            <div class="overflow-y-auto flex-grow flex flex-col md:flex-row">
                <div class="md:w-1/2 bg-gray-900 flex items-center justify-center min-h-[300px]">
                    <img id="modal-ad-img" class="max-w-full max-h-[500px] object-contain">
                </div>
                
                <div class="p-6 md:w-1/2 flex flex-col bg-white">
                    <span id="modal-ad-type" class="inline-block text-white text-xs font-bold px-2 py-1 rounded w-max mb-3"></span>
                    <h3 class="text-2xl font-bold text-gray-800 leading-tight mb-2" id="modal-ad-title"></h3>
                    <p id="modal-ad-price" class="text-3xl font-black text-brand mb-4"></p>
                    
                    <div class="flex items-center gap-2 mb-6 text-sm text-gray-600 border-b pb-4">
                        <span>👤 Verkäufer: <b id="modal-ad-seller" class="text-gray-800"></b></span>
                    </div>
                    
                    <h4 class="font-bold text-gray-800 mb-2">Beschreibung:</h4>
                    <p id="modal-ad-desc" class="text-gray-700 whitespace-pre-wrap flex-grow leading-relaxed"></p>
                </div>
            </div>
            
            <div class="p-4 border-t bg-gray-50 flex flex-wrap gap-3 items-center justify-end" id="modal-ad-actions">
            </div>
        </div>
    </div>

    <div id="crop-modal" class="fixed inset-0 bg-black bg-opacity-80 z-50 hidden flex flex-col items-center justify-center p-4">
        <div class="bg-white p-4 rounded-lg w-full max-w-2xl flex flex-col h-[80vh]">
            <h3 class="text-xl font-bold mb-4">Bild zuschneiden</h3>
            <div class="flex-grow w-full relative bg-gray-100 overflow-hidden">
                <img id="cropper-image" class="max-w-full block">
            </div>
            <div class="mt-4 flex justify-end gap-4">
                <button onclick="closeCropper()" class="bg-gray-300 px-4 py-2 rounded font-bold hover:bg-gray-400">Abbruch</button>
                <button onclick="uploadCroppedImage()" id="upload-btn" class="bg-brand text-white px-4 py-2 rounded font-bold hover:bg-brandHover">Hochladen</button>
            </div>
        </div>
    </div>

    <script src="script_1.js?v=lyknyeP3"></script>
</body>
</html>
