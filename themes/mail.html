<!DOCTYPE html><html lang="de"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✉️ Limazon Postfach</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --card-hover: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        h1 { color: var(--primary); }
        
        .hidden { display: none !important; }
        
        /* Mail Liste */
        .mail-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 15px; transition: 0.2s; position: relative; }
        .mail-card.unread { border-left: 4px solid var(--primary); background: #253347; }
        
        .mail-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; color: var(--text-muted); }
        .mail-subject { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .mail-content { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 6px; margin-bottom: 15px; white-space: pre-wrap; }
        
        .reward-box { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); padding: 15px; border-radius: 6px; text-align: center; }
        
        button { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        button:disabled { background: var(--border); cursor: not-allowed; color: var(--text-muted); }
        .btn-claim { background: var(--success); margin-top: 10px; font-size: 1.1rem; }

        /* Admin Panel */
        .admin-panel { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 15px; background: #0b1120; border: 1px solid var(--border); color: white; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>✉️ Postfach</h1>
        <p>Nachrichten vom Limazon-System und den Admins.</p>
    </header>

    <div id="admin-panel" class="admin-panel hidden">
        <h2 style="color: var(--danger); margin-bottom: 15px;">🛠️ Neue System-Mail verfassen</h2>
        
        <label>Empfänger:</label>
        <select id="mail-target">
            <option value="active">Nur aktive Spieler (letzte 7 Tage)</option>
            <option value="all">An absolut alle User</option>
            <option value="single">Spezieller User (Name unten eingeben)</option>
        </select>
        <input type="text" id="mail-target-name" placeholder="Username (nur wenn 'Spezieller User' gewählt)" class="hidden">

        <label>Betreff:</label>
        <input type="text" id="mail-subject" placeholder="z.B. Entschuldigung für den Ausfall!">

        <label>Nachricht:</label>
        <textarea id="mail-content" rows="4" placeholder="Schreibe deine Nachricht..."></textarea>

        <h3 style="margin-top: 10px; font-size: 1rem; color: var(--warning);">🎁 Belohnungen anhängen (Optional)</h3>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <input type="number" id="mail-reward-money" placeholder="Geld (z.B. 50000)">
            <input type="number" id="mail-reward-tokens" placeholder="Tokens (z.B. 25)">
            <input type="text" id="mail-reward-badge" placeholder="Badge-ID (z.B. bug_survivor)">
        </div>

        <button style="background: var(--danger);" onclick="sendAdminMail()">📨 Mail absenden</button>
    </div>

    <div id="inbox-container">
        <p style="text-align: center; color: var(--text-muted);">Lade E-Mails...</p>
    </div>
</div>

<script>
    const API_BASE = 'https://api.limazon.v6.rocks/api';
    const fetchOptions = { credentials: 'include', headers: { 'Content-Type': 'application/json' } };

    document.getElementById('mail-target').addEventListener('change', (e) => {
        document.getElementById('mail-target-name').classList.toggle('hidden', e.target.value !== 'single');
    });

    async function init() {
        try {
            const authRes = await fetch(`${API_BASE}/auth/me`, fetchOptions);
            if (!authRes.ok) return alert("Bitte einloggen.");
            const user = await authRes.json();
            
            if (user.isRealAdmin) document.getElementById('admin-panel').classList.remove('hidden');
            loadMails();
        } catch (e) { console.error(e); }
    }

    async function loadMails() {
        const container = document.getElementById('inbox-container');
        try {
            const res = await fetch(`${API_BASE}/mail/inbox`, fetchOptions);
            const data = await res.json();

            container.innerHTML = '';
            if (!data.mails || data.mails.length === 0) {
                container.innerHTML = '<p style="text-align: center;">Dein Postfach ist leer.</p>';
                return;
            }

            data.mails.forEach(mail => {
                const isUnread = !mail.isRead;
                const hasUnclaimedReward = mail.rewards && !mail.isClaimed;
                
                let rewardHtml = '';
                if (mail.rewards) {
                    if (mail.isClaimed) {
                        rewardHtml = `<div class="reward-box" style="border-color: var(--border); opacity: 0.6;">✅ Belohnung wurde bereits eingelöst.</div>`;
                    } else {
                        rewardHtml = `
                            <div class="reward-box">
                                <p style="margin-bottom: 10px; font-weight: bold;">🎁 Diese Mail enthält eine Belohnung!</p>
                                <button class="btn-claim" onclick="claimReward('${mail._id}')">Einlösen</button>
                            </div>
                        `;
                    }
                }

                container.innerHTML += `
                    <div class="mail-card ${isUnread ? 'unread' : ''}" id="mail-${mail._id}">
                        <div class="mail-header">
                            <span>Von: <strong>${mail.sender}</strong></span>
                            <span>${new Date(mail.createdAt).toLocaleString('de-DE')}</span>
                        </div>
                        <div class="mail-subject">${mail.subject}</div>
                        <div class="mail-content">${mail.content}</div>
                        ${rewardHtml}
                    </div>
                `;

                // Wenn ungelesen, automatisch im Backend als gelesen markieren
                if (isUnread) {
                    fetch(`${API_BASE}/mail/${mail._id}/read`, { ...fetchOptions, method: 'POST' });
                }
            });

        } catch (e) {
            container.innerHTML = '<p style="color: red;">Fehler beim Laden.</p>';
        }
    }

    async function claimReward(mailId) {
        try {
            const res = await fetch(`${API_BASE}/mail/${mailId}/claim`, { ...fetchOptions, method: 'POST' });
            const data = await res.json();
            
            if (res.ok) {
                alert(data.message);
                loadMails(); // Lade neu, damit der Button verschwindet
            } else {
                alert(data.error);
            }
        } catch (e) {
            alert("Fehler beim Einlösen.");
        }
    }

    // Für Admins
    async function sendAdminMail() {
        if(!confirm("Mail wirklich absenden?")) return;

        let target = document.getElementById('mail-target').value;
        if (target === 'single') target = document.getElementById('mail-target-name').value;

        const money = parseInt(document.getElementById('mail-reward-money').value) || 0;
        const tokens = parseInt(document.getElementById('mail-reward-tokens').value) || 0;
        const badge = document.getElementById('mail-reward-badge').value.trim();

        let rewards = null;
        if (money > 0 || tokens > 0 || badge) {
            rewards = {};
            if (money > 0) rewards.money = money;
            if (tokens > 0) rewards.tokens = tokens;
            if (badge) rewards.badge = badge;
        }

        const payload = {
            target: target,
            subject: document.getElementById('mail-subject').value,
            content: document.getElementById('mail-content').value,
            rewards: rewards
        };

        try {
            const res = await fetch(`${API_BASE}/admin/mail/send`, {
                ...fetchOptions,
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            alert(res.ok ? data.message : data.error);
            if(res.ok) {
                document.getElementById('mail-subject').value = '';
                document.getElementById('mail-content').value = '';
                loadMails(); // Damit der Admin seine eigene gesendete Mail (falls 'all' gewählt) sieht
            }
        } catch (e) {
            alert("Sende-Fehler.");
        }
    }

    window.onload = init;
</script>

</body></html>
