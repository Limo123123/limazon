<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limo Supreme Court ⚖️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style_0.css?v=pPWRxQ3G">
</head>

<body class="p-4 md:p-8">

    <div class="bg-court"></div>

    <header class="text-center mb-8 mt-4 relative">
        <div class="absolute top-0 left-0">
            <a href="/"
                class="text-xs text-gold hover:text-white tracking-widest uppercase font-bold transition-colors">←
                Zurück</a>
        </div>
        <div class="inline-block border-b-2 border-gold pb-4 px-10">
            <h1 class="text-5xl md:text-7xl font-law font-bold text-white tracking-widest uppercase">Limo Court</h1>
            <p class="text-xs text-gold uppercase tracking-[0.4em] mt-2">Im Namen des Volkes</p>
        </div>
    </header>

    <div class="text-center mb-12">
        <button onclick="openFileCaseModal()"
            class="bg-gradient-to-r from-yellow-700 to-yellow-600 hover:from-yellow-600 hover:to-yellow-500 text-black font-bold font-law py-3 px-8 rounded shadow-lg transform hover:scale-105 transition border border-yellow-400">
            ⚖️ ANKLAGE ERHEBEN
        </button>
    </div>

    <main class="max-w-5xl mx-auto w-full">

        <div id="active-case"
            class="case-file rounded-sm p-8 md:p-12 mb-12 relative min-h-[400px] flex flex-col justify-center">

            <div id="loader" class="text-center">
                <div class="inline-block animate-spin text-4xl mb-4 text-gold">⚖️</div>
                <h2 class="text-xl font-law text-gray-400 uppercase tracking-widest animate-pulse">Lade Gerichtsakten...
                </h2>
                <p class="text-xs font-data text-gray-600 mt-2">Verbindung zum Justiz-Server wird hergestellt.</p>
            </div>

        </div>

        <div class="border-t border-gray-800 pt-10">
            <h3 class="text-gold font-law text-2xl mb-8 uppercase tracking-widest text-center">Aktenarchiv</h3>
            <div id="archive-list" class="space-y-4 font-data text-sm max-w-3xl mx-auto">
                <div class="text-center text-gray-600 italic">Lade Archiv...</div>
            </div>
        </div>

    </main>

    <div id="file-case-modal">
        <div class="modal-paper relative">
            <button onclick="closeFileCaseModal()"
                class="absolute top-4 right-4 text-2xl text-gray-500 hover:text-black">&times;</button>
            <div class="text-center mb-8 border-b-2 border-gray-300 pb-4">
                <h2 class="font-law text-3xl font-bold uppercase tracking-widest text-black">Anklageschrift</h2>
                <p class="text-xs uppercase tracking-wider text-gray-600 mt-1">Formular 12-B / Limo Justizbehörde</p>
            </div>
            <form id="prosecute-form" class="space-y-8">
                <div>
                    <label class="block text-xs uppercase font-bold text-gray-500 mb-1">Angeklagter (Username)</label>
                    <input type="text" id="accused-name" placeholder="Wen willst du verklagen?" class="input-official"
                        required>
                </div>
                <div>
                    <label class="block text-xs uppercase font-bold text-gray-500 mb-1">Straftatbestand</label>
                    <select id="crime-type" class="input-official bg-transparent">
                        <option value="Diebstahl">Diebstahl ($)</option>
                        <option value="Betrug">Betrug / Scam</option>
                        <option value="Beleidigung">Beleidigung</option>
                        <option value="Griefing">Zerstörung (Griefing)</option>
                        <option value="Sonstiges">Sonstiges</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs uppercase font-bold text-gray-500 mb-1">Beweisführung</label>
                    <textarea id="evidence-text" rows="3" placeholder="Was ist passiert? Beschreibe den Vorfall..."
                        class="input-official resize-none" required></textarea>
                </div>
                <div class="flex justify-between items-center pt-4">
                    <div class="text-xs text-gray-500">*Falschaussagen werden mit<br>sofortigem Bann bestraft.</div>
                    <button type="submit"
                        class="bg-black text-white font-law font-bold uppercase py-3 px-8 hover:bg-gray-800 transition shadow-lg tracking-widest border border-gold">Einreichen</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script_0.js?v=GS0O7PxK"></script>
</body>

</html>
