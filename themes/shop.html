<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Fremder Test-Shop</title>
    <style>
        body { font-family: sans-serif; padding: 50px; text-align: center; background: #f4f4f4; }
        .product { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { background: #6366f1; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="product">
        <h2>Cooles Limo T-Shirt</h2>
        <p>Preis: $25.00</p>
        <button onclick="kaufeMitLimoPay()">Mit LimoPay bezahlen</button>
    </div>

    <script>
    async function kaufeMitLimoPay() {
        const res = await fetch('https://api.limazon.v6.rocks/api/pay/v1/payments/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                apiKey: 'test_key_123', 
                amount: 25.00,
                description: 'Kauf: Cooles Limo T-Shirt',
                successUrl: 'https://limipedia.any64.de' 
            })
        });

        const data = await res.json();
        if (data.success && data.checkoutUrl) {
            window.location.href = data.checkoutUrl; 
        } else {
            alert("Fehler: " + data.error);
        }
    }
</script>
</body>
</html>
