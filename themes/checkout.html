<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LimoPay Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #0f172a; color: white; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-sm w-full border border-slate-700 text-center">
        <div class="w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center text-2xl mx-auto mb-4 shadow-lg shadow-indigo-500/30">💳</div>
        <h1 class="text-2xl font-bold mb-2">LimoPay</h1>
        <p class="text-slate-400 text-sm mb-6" id="status-text">Lade Zahlungsdaten...</p>

        <div class="bg-slate-900 p-4 rounded-xl mb-6 border border-slate-700">
            <p class="text-sm text-slate-400 mb-1">Zu zahlender Betrag:</p>
            <p class="text-3xl font-mono font-bold text-emerald-400" id="amount-text">$--</p>
        </div>

        <button id="pay-btn" onclick="executePayment()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-500 transition shadow-lg active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
            Zahlung bestätigen
        </button>
    </div>

    <script>
        // HIER MUSS DEINE API DOMAIN REIN:
        const API_BASE = 'https://api.limazon.v6.rocks/v1/payments'; 
        
        const urlParams = new URLSearchParams(window.location.search);
        const paymentId = urlParams.get('id');

        async function loadPaymentInfo() {
            if (!paymentId) return document.getElementById('status-text').innerText = "Ungültiger Link.";

            try {
                // HINWEIS: pay.limazon.v6.rocks ODER api.limazon.v6.rocks klappt beides, 
                // je nachdem wie deine Proxies eingestellt sind.
                const res = await fetch(`https://pay.limazon.v6.rocks/v1/payments/${paymentId}/status`);
                const data = await res.json();

                if (res.ok && data.status === 'pending') {
                    document.getElementById('status-text').innerText = "Bitte bestätige die Zahlung.";
                    document.getElementById('amount-text').innerText = `$${data.amount.toFixed(2)}`;
                } else {
                    document.getElementById('status-text').innerText = "Zahlung bereits verarbeitet oder ungültig.";
                    document.getElementById('pay-btn').disabled = true;
                }
            } catch (e) {
                document.getElementById('status-text').innerText = "Fehler beim Laden.";
            }
        }

        async function executePayment() {
            const btn = document.getElementById('pay-btn');
            btn.disabled = true;
            btn.innerText = "Verarbeite...";

            try {
                const res = await fetch(`https://api.limazon.v6.rocks/v1/payments/${paymentId}/execute`, {
                    method: 'POST',
                    credentials: 'include' // Schickt dein Limazon-Login mit!
                });
                const data = await res.json();

                if (res.ok) {
                    btn.className = "w-full bg-emerald-600 text-white font-bold py-4 rounded-xl transition";
                    btn.innerText = "Erfolgreich! Leite weiter...";
                    setTimeout(() => window.location.href = data.redirectUrl, 2000);
                } else {
                    alert("Zahlung fehlgeschlagen: " + data.error);
                    btn.disabled = false;
                    btn.innerText = "Erneut versuchen";
                }
            } catch (e) {
                alert("Verbindungsfehler.");
                btn.disabled = false;
            }
        }

        window.onload = loadPaymentInfo;
    </script>
</body>
</html>
